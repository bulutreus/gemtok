      for (let i = 0; i < particleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 120 + Math.random() * 260 + intensity * 140;
        state.collisionEffects.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0.26 + Math.random() * 0.22,
          maxLife: 0.26 + Math.random() * 0.22,
          size: 2 + Math.random() * 4
        });
      }
      state.collisionEffects.push({
        x,
        y,
        vx: 0,
        vy: 0,
        life: 0.12,
        maxLife: 0.12,
        size: 20 + intensity * 28,
        flash: true
      });

        const drift = 14 + Math.random() * 28;

    function spawnGiftBurst(teamId, points) {
      const E = ARENA3.effects;
      const pts = Math.max(1, Math.floor(points || 1));
      const intensity = Math.min(1, pts / 40);
      const n = Math.min(
        E.giftParticlesCap,
        Math.floor(E.giftParticlesBase + pts * E.giftParticlesPerPoint)
      );
      const source = getTeamBall(teamId);
      if (!source) return;
      const style = giftStyleForTeam(teamId);
      for (let i = 0; i < n; i++) {
        const ang = Math.random() * Math.PI * 2;
        const sp = 90 + Math.random() * 160 + intensity * 200;
        state.giftEffects.push({
          x: source.x + (Math.random() - 0.5) * (36 + pts * 0.6),
          y: source.y + (Math.random() - 0.5) * (28 + pts * 0.45),
          vx: Math.cos(ang) * sp * 0.55 + (Math.random() - 0.5) * 70,
          vy: -(110 + Math.random() * 140 + intensity * 160),
          life: 0.72 + Math.random() * 0.55 + intensity * 0.35,
          maxLife: 0.72 + Math.random() * 0.55 + intensity * 0.35,
          size: 11 + Math.random() * 9 + intensity * 10,
          icon: style.icon,
          color: style.color
        });
      }
      if (state.giftEffects.length > E.giftEffectCap) {
        state.giftEffects.splice(0, state.giftEffects.length - E.giftEffectCap);
      }
      if (pts >= E.shockwavePointThreshold) {
        spawnShockwave(source.x, source.y, Math.min(1, intensity * 1.1));
      }
      if (pts >= 10) {
        state.cameraShake = Math.min(1, state.cameraShake + 0.08 + intensity * 0.35);
      }
      spawnGiftScreenFlash(pts);
    }

    function updateCollisionEffects(dtSec) {
      for (let i = state.collisionEffects.length - 1; i >= 0; i--) {
        const p = state.collisionEffects[i];
        p.life -= dtSec;
        if (p.life <= 0) {
          state.collisionEffects.splice(i, 1);
          continue;
        }
        if (!p.flash) {
          p.x += p.vx * dtSec;
          p.y += p.vy * dtSec;
          p.vx *= 0.94;
          p.vy *= 0.94;
        }
      }
    }

    function updateDustEffects(dtSec) {
      for (let i = state.dustEffects.length - 1; i >= 0; i--) {
        const p = state.dustEffects[i];
        p.life -= dtSec;
        if (p.life <= 0) {
          state.dustEffects.splice(i, 1);
          continue;
        }
        p.x += p.vx * dtSec;
        p.y += p.vy * dtSec;
        p.vx *= 0.9;
        p.vy *= 0.9;
      }
    }

    function updateShockwaves(dtSec) {
      for (let i = state.shockwaves.length - 1; i >= 0; i--) {
        const s = state.shockwaves[i];
        s.life -= dtSec;
        if (s.life <= 0) {
          state.shockwaves.splice(i, 1);
          continue;
        }
        s.radius += s.growth * dtSec;
      }
    }

    function updateGiftEffects(dtSec) {
      for (let i = state.giftEffects.length - 1; i >= 0; i--) {
        const g = state.giftEffects[i];
        g.life -= dtSec;
        if (g.life <= 0) {
          state.giftEffects.splice(i, 1);
          continue;
        }
        g.x += g.vx * dtSec;
        g.y += g.vy * dtSec;
        g.vx *= 0.96;
        g.vy += 80 * dtSec;
      }
    }

    function drawCollisionEffects() {
      state.collisionEffects.forEach((p) => {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.save();
        if (p.flash) {
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          g.addColorStop(0, `rgba(255, 245, 200, ${alpha * 0.9})`);
          g.addColorStop(1, "rgba(255, 210, 120, 0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = `rgba(255, 210, 130, ${alpha * 0.9})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
    }

    function drawDustEffects() {
      state.dustEffects.forEach((p) => {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = `rgba(80, 80, 80, ${alpha * 0.3})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawShockwaves() {
      state.shockwaves.forEach((s) => {
        const alpha = Math.max(0, s.life / s.maxLife);
        ctx.strokeStyle = `rgba(255, 214, 150, ${alpha * 0.55})`;
        ctx.lineWidth = s.width;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.stroke();
      });
    }

    function drawGiftIcon(gift) {
      const alpha = Math.max(0, gift.life / gift.maxLife);
      const age = 1 - alpha;
      const pop = 0.78 + 0.28 * (1 - age * age);
      const s = gift.size * pop;
      ctx.save();
      ctx.translate(gift.x, gift.y);
      ctx.globalAlpha = alpha;

      if (gift.icon === "coin") {
        ctx.fillStyle = gift.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, s * 0.85, s * 0.65, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.75)";
        ctx.lineWidth = 1.8;
        ctx.stroke();
      } else if (gift.icon === "heart") {
        ctx.fillStyle = gift.color;
        ctx.beginPath();
        ctx.moveTo(0, s * 0.5);
        ctx.bezierCurveTo(-s * 1.1, -s * 0.2, -s * 0.65, -s * 1.15, 0, -s * 0.55);
        ctx.bezierCurveTo(s * 0.65, -s * 1.15, s * 1.1, -s * 0.2, 0, s * 0.5);
        ctx.fill();
      } else if (gift.icon === "star") {
        drawStar(0, 0, s * 0.72, gift.color);
      } else {
        ctx.strokeStyle = gift.color;
        ctx.lineWidth = 2.1;
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.4, Math.PI * 0.2, Math.PI * 1.8);
        ctx.stroke();
        ctx.fillStyle = gift.color;
        ctx.beginPath();
        ctx.arc(0, -s * 0.45, s * 0.18, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawGiftEffects() {
      state.giftEffects.forEach(drawGiftIcon);
    }

    function randomVelocity(speed) {
      const angle = Math.random() * Math.PI * 2;
      return { vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed };
    }

    function applyCruiseMotion(balls, arena, dtSec, nt) {
      const P = ARENA3.physics;
      const minSpeed =
        (P.minCruiseSpeed || 0) * (nt >= 3 ? P.clusterCruiseScale || 1 : 1);
      if (minSpeed <= 0) return;
      const accel = Math.max(1, P.cruiseAccel || 24);
      balls.forEach((entry) => {
        const ball = entry.ball;
        const sp = Math.hypot(ball.vx, ball.vy);
        if (sp >= minSpeed) return;
        const idx = slotIndexFromId(entry.id);
        const radial = Math.atan2(ball.y - arena.cy, ball.x - arena.cx);
        const swirl = radial + Math.PI / 2 + (idx % 2 ? -0.38 : 0.38);
        const drift = performance.now() * 0.00028 + idx * 1.137;
        const target = swirl + Math.sin(drift) * 0.55;
        const add = Math.min(minSpeed - sp, accel * dtSec);
        ball.vx += Math.cos(target) * add;
        ball.vy += Math.sin(target) * add;
      });
    }

    function stepPhysics(dtSec, arena, ballLayout) {
      const { radii } = ballLayout;
      const scaledDt = dtSec * state.speedMultiplier;
      const P = ARENA3.physics;
      const gap = P.minPlayerGap;
      state.physFrameIdx = (state.physFrameIdx + 1) | 0;

      const balls = buildActiveBallEntries(radii);
      const nt = balls.length;
      if (nt === 0) return;

      const maxRPhys = Math.max(
        ...balls.map((b) => ballCollisionRadius(b.radius, b.id)),
        36
      );
      const dustP = ARENA3.effects.dustSpawnProb;

      const fixed = Math.max(1 / 240, P.fixedTimestep || 1 / 120);
      const maxSteps = Math.max(1, Math.floor(P.maxSubSteps) || 6);
      state.physicsAccumulator = (state.physicsAccumulator || 0) + scaledDt;
      if (state.physicsAccumulator > fixed * maxSteps) {
        state.physicsAccumulator = fixed * maxSteps;
      }

      let subSteps = 0;
      while (state.physicsAccumulator >= fixed && subSteps < maxSteps) {
        state.physicsAccumulator -= fixed;
        subSteps += 1;
        applyCruiseMotion(balls, arena, fixed, nt);
        physicsSubstep(fixed, arena, balls, gap, nt, maxRPhys, true);
      }

      if (subSteps === 0 && scaledDt > 1e-6) {
        const subDt = Math.min(scaledDt, fixed);
        applyCruiseMotion(balls, arena, subDt, nt);
        physicsSubstep(subDt, arena, balls, gap, nt, maxRPhys, true);
      }

      balls.forEach(({ ball }) => {
        if (Math.random() < dustP) {
          spawnDustTrail(ball.x, ball.y, Math.hypot(ball.vx, ball.vy));
        }
      });

      updatePairOverlapDeadlock(balls, gap);
      updateStuckBallEscape(balls, arena, gap, nt);
      runPositionSolver(balls, arena, gap, 4);
      stabilizeContactVelocities(balls, gap, nt);
      clampBallSpeeds(balls, radii, nt, maxRPhys);

      updateCollisionEffects(scaledDt);
      updateDustEffects(scaledDt);
      updateShockwaves(scaledDt);
      updateGiftEffects(scaledDt);
      state.cameraShake = Math.max(0, state.cameraShake - scaledDt * (nt >= 3 ? 3.4 : 2.1));
    }

    function tickDisplayScores(dtSec) {
      const k = Math.min(1, dtSec * ARENA3.scoreUi.lerpPerSec);
      activeTeamIds().forEach((id) => {
        const target = state.scores[id];
        let cur = state.displayScores[id];
        if (cur == null || !Number.isFinite(cur)) cur = target;
        cur += (target - cur) * k;
        if (Math.abs(target - cur) < 0.51) cur = target;
        state.displayScores[id] = cur;
        const row = teamEls[id];
        if (row && row.score) row.score.textContent = String(Math.round(cur));
      });
    }

    function animate(ts) {
      if (document.hidden) {
        state.lastFrameTime = 0;
        requestAnimationFrame(animate);
        return;
      }
      if (!state.lastFrameTime) state.lastFrameTime = ts;
      const dtSec = Math.min((ts - state.lastFrameTime) / 1000, ARENA3.physics.maxFrameDelta || 0.05);
      state.lastFrameTime = ts;
      const arena = getArenaGeometry();
      const ballLayout = tickSmoothBallRadii();
      tickDisplayScores(dtSec);
      tickGiftScreenFlash(dtSec);
      stepPhysics(dtSec, arena, ballLayout);
      render(arena, ballLayout);
      requestAnimationFrame(animate);
    }

    function teardownLeaderEndedListener() {
      const la = state.leaderEndedAudio;
      const lh = state.leaderEndedHandler;
      if (la && lh) {
        try {
          la.removeEventListener("ended", lh);
        } catch (_e) {}
      }
      state.leaderEndedAudio = null;
      state.leaderEndedHandler = null;
    }

    function stopLeadSong() {
      if (state.leaderMusicPlayingId) saveMusicPlaybackPosition(state.leaderMusicPlayingId);
      teardownLeaderEndedListener();
      SLOT_IDS.forEach((id) => {
        state.audios[id].pause();
      });
      state.leaderMusicPlayingId = null;
    }

    async function playLeaderSong(leader, opts = {}) {
      if (!state.audioReady) return;
      const forceRestart = opts.forceRestart === true;
      const prevPlaying = state.leaderMusicPlayingId;

      if (leader === "none") {
        if (prevPlaying) saveMusicPlaybackPosition(prevPlaying);
        SLOT_IDS.forEach((id) => state.audios[id].pause());
        teardownLeaderEndedListener();
        state.leaderMusicPlayingId = null;
        return;
      }

      const a = state.audios[leader];
      if (!a || !a.src) {
        if (prevPlaying) saveMusicPlaybackPosition(prevPlaying);
        SLOT_IDS.forEach((id) => state.audios[id].pause());
        teardownLeaderEndedListener();
        state.leaderMusicPlayingId = null;
        return;
      }

      if (!forceRestart && prevPlaying === leader && !a.paused && !a.ended) {
        wireLeaderMusicEndedHandler(leader, a);
        return;
      }

      if (prevPlaying && prevPlaying !== leader) {
        saveMusicPlaybackPosition(prevPlaying);
      }

      SLOT_IDS.forEach((id) => {
        if (id !== leader) state.audios[id].pause();
      });

      teardownLeaderEndedListener();

      if (forceRestart) {
        try {
          a.currentTime = 0;
        } catch (_e) {}
        if (!state.musicPlaybackTime) state.musicPlaybackTime = Object.create(null);
        state.musicPlaybackTime[leader] = { t: 0, key: audioTrackKey(a) };
      } else {
        restoreMusicPlaybackPosition(leader);
      }

      wireLeaderMusicEndedHandler(leader, a);

      try {
        await a.play();
        state.leaderMusicPlayingId = leader;
      } catch (_e) {}
    }

    async function initAudio() {
      if (state.audioReady) return;
      state.audioReady = true;
      playLeaderSong(getLeader());
    }

    function refreshScoreboardOrder() {
      const ranked = activeTeamIds()
        .map((id) => ({
          id,
          score: state.scores[id],
          el: teamEls[id] && teamEls[id].wrap
        }))
        .filter((row) => row.el)
        .sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          return SLOT_IDS.indexOf(a.id) - SLOT_IDS.indexOf(b.id);
        });
      ranked.forEach((row, index) => {
        row.el.style.order = String(index);
      });
    }

    function syncScoreboardLeading(leader) {
      activeTeamIds().forEach((id) => {
        const w = teamEls[id] && teamEls[id].wrap;
        if (w) w.classList.toggle("leading", leader === id);
      });
    }

    function updateAll() {
      refreshScoreboardOrder();
      const leader = getLeader();
      if (leader !== state.currentLeader) {
        state.currentLeader = leader;
        playLeaderSong(leader);
      }
      syncScoreboardLeading(leader);
      paintArenaFrame();
    }

    if (typeof GemtokGameSettingsFab !== "undefined") {
      GemtokGameSettingsFab.wire(openSettings, { backdropId: "settings-backdrop" });
    } else {
      document.getElementById("gemtok-open-settings")?.addEventListener("click", (e) => {
        e.stopPropagation();
        openSettings();
      });
    }

    settingsBackdrop.addEventListener("click", (e) => {
      if (e.target === settingsBackdrop || e.target.classList.contains("settings-overlay__backdrop")) closeSettings();
    });
    settingsClose.addEventListener("click", closeSettings);

    const tikfinityWsSave = document.getElementById("tikfinity-ws-save");
    if (tikfinityWsSave) {
      tikfinityWsSave.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const inp = document.getElementById("tikfinity-ws-input");
        const v = (inp && inp.value.trim()) || "";
        if (v && /^wss?:\/\//i.test(v)) {
          try {
            localStorage.setItem(WS_STORAGE_KEY, v);
          } catch (_e) {}
        } else if (inp) {
          try {
            localStorage.removeItem(WS_STORAGE_KEY);
          } catch (_e) {}
        }
        connectTikfinity({ bypassDisable: true });
      });
    }

    const settingsPanel = document.getElementById("settings-panel");
    if (settingsPanel) {
      settingsPanel.addEventListener("click", (ev) => {
        const giftTrigger = ev.target.closest("[data-gift-trigger]");
        if (giftTrigger) {
          ev.stopPropagation();
          openGiftComboPopover(giftTrigger.getAttribute("data-gift-trigger"));
          return;
        }
        const browsePhoto = ev.target.closest("[data-photo-browse]");
        if (browsePhoto) {
          ev.stopPropagation();
          const id = browsePhoto.getAttribute("data-photo-browse");
          document.getElementById(`file-${id}`)?.click();
          return;
        }
        const browseMusic = ev.target.closest("[data-music-browse]");
        if (browseMusic) {
          ev.stopPropagation();
          const id = browseMusic.getAttribute("data-music-browse");
          const slot = browseMusic.getAttribute("data-music-slot") || "0";
          document.getElementById(`file-music-${id}-${slot}`)?.click();
          return;
        }
        const clearMusicSlot = ev.target.closest("[data-music-clear-slot]");
        if (clearMusicSlot) {
          ev.stopPropagation();
          const id = clearMusicSlot.getAttribute("data-music-clear-slot");
          const slot = clearMusicSlot.getAttribute("data-music-slot") || "0";
          void applyTeamMusicSlot(id, slot, null);
          return;
        }
        const clearMusicAll = ev.target.closest("[data-music-clear-all]");
        if (clearMusicAll) {
          ev.stopPropagation();
          void applyTeamMusicClearAll(clearMusicAll.getAttribute("data-music-clear-all"));
          return;
        }
        const clearPhoto = ev.target.closest("[data-photo-clear]");
        if (clearPhoto) {
          ev.stopPropagation();
          applyTeamPhoto(clearPhoto.getAttribute("data-photo-clear"), "");
          return;
        }
      });

      settingsPanel.addEventListener("change", (ev) => {
        const t = ev.target;
        if (!(t instanceof HTMLInputElement)) return;
        if (t.type === "text") {
          const mt = /^teamPhotoUrl-(s\d+)$/.exec(t.id);
          if (mt) applyTeamPhoto(mt[1], t.value.trim());
          return;
        }
        if (t.type !== "file") return;
        let m = /^file-music-(s\d+)-(\d)$/.exec(t.id);
        if (m) {
          const id = m[1];
          const slot = m[2];
          const f = t.files && t.files[0];
          t.value = "";
          if (!f) return;
          if (!f.type.startsWith("audio/") && !/\.(mp3|m4a|aac|ogg|wav|webm|flac)$/i.test(f.name)) return;
          void applyTeamMusicSlot(id, slot, f);
          return;
        }
        m = /^file-(s\d+)$/.exec(t.id);
        if (m) {
          const id = m[1];
          const f = t.files && t.files[0];
          t.value = "";
          if (!f || !f.type.startsWith("image/")) return;
          fileToResizedDataUrl(f, 320, (dataUrl) => {
            if (dataUrl) applyTeamPhoto(id, dataUrl);
          });
        }
      });

      settingsPanel.addEventListener("input", (ev) => {
        const t = ev.target;
        if (!(t instanceof HTMLInputElement)) return;
        const mt = /^teamPhotoUrl-(s\d+)$/.exec(t.id);
        if (!mt) return;
        const preview = document.getElementById(`teamPhotoPreview-${mt[1]}`);
        if (preview) preview.src = t.value.trim() || "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
      });
    }

    settingsGiftSearch?.addEventListener("input", () => {
      if (giftComboPopoverTeamId != null) rebuildGiftComboPopover();
    });

    document.addEventListener("pointerdown", (ev) => {
      if (!giftComboPopover || giftComboPopover.hidden) return;
      const t = ev.target;
      if (!(t instanceof Node)) return;
      if (giftComboPopover.contains(t)) return;
      if (t instanceof Element && t.closest(".gift-combo")) return;
      closeGiftComboPopover();
    });

    function handleKeyScore(event) {
      if (event.key === "Escape" && settingsBackdrop && !settingsBackdrop.hidden) {
        event.preventDefault();
        closeSettings();
        return;
      }
      if (/^[0-9]$/.test(event.key)) {
        const idx = event.key === "0" ? 9 : parseInt(event.key, 10) - 1;
        if (idx >= 0 && idx < state.playerCount) {
          const teamId = SLOT_IDS[idx];
          if (!state.audioReady) initAudio();
          state.scores[teamId] += 1;
          spawnGiftBurst(teamId, 1);
          updateAll();
        }
        return;
      }
      if (event.key === "ArrowUp") {
        state.speedMultiplier = Math.min(3, state.speedMultiplier + 0.15);
      } else if (event.key === "ArrowDown") {
        state.speedMultiplier = Math.max(0.35, state.speedMultiplier - 0.15);
      }
    }

    window.addEventListener("keydown", handleKeyScore);
    window.addEventListener("beforeunload", () => {
      stopLeadSong();
      SLOT_IDS.forEach((id) => {
        state.audios[id].removeAttribute("src");
        state.audios[id].src = "";
        revokeTeamMusicUrls(id);
      });
      disconnectTikfinity({ intentional: true });
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") return;
      if (isTikfinityAutoWsDisabled()) return;
      const w = state.tikfinity.ws;
      if (!w || w.readyState === WebSocket.CLOSED) connectTikfinity({ bypassDisable: true });
    });
    window.addEventListener("pageshow", (ev) => {
      restoreTeamCrests();
      if (!ev.persisted) return;
      if (isTikfinityAutoWsDisabled()) return;
      connectTikfinity({ bypassDisable: true });
    });

    function deferArena3BackgroundWork() {
      const run = () => {
        void refreshGiftAssignCatalog({ force: false }).then(() => {
          activeTeamIds().forEach((teamId) =>
            syncGiftComboTrigger(teamId, getAssignedGiftIdForTeam(teamId))
          );
        });
        void loadTeamMusicFromIDB();
        if (settingsTeamsRoot && !settingsTeamsRoot.childElementCount) buildSettingsTeamRows();
      };
      if (typeof requestIdleCallback === "function") {
        requestIdleCallback(run, { timeout: 3000 });
      } else {
        setTimeout(run, 80);
      }
    }

    (async function boot() {
      loadPlayerCountFromStorage();
      loadLocalGiftAssignmentsToState();
      sanitizeLocalGiftAssignments();
      loadPhotosFromStorage();
      initPlayerCountModeUI();
      buildScoreboard();
      ensureAllBallSlots();
      layoutBallsForArena();

      state.currentLeader = getLeader();
      updateAll();
      requestAnimationFrame(animate);
      if (!isTikfinityAutoWsDisabled()) connectTikfinity();
      deferArena3BackgroundWork();
    })();
  </script>
  <link rel="stylesheet" href="../../sira/gemtok-settings-theme.css" />
  <script src="../../gemtok-game-settings-fab.js"></script>

  <style>
    :root {
      --bg: #000000;
      --text: #f2f2f2;
      --gold: #f0cf45;
      --gold-soft: #fff0a0;
      --scorebox-bg: rgba(10, 10, 12, 0.94);
      --scorebox-border: rgba(110, 175, 235, 0.92);
      --scorebox-glow: rgba(70, 150, 220, 0.22);
      --team-leading-border: rgba(240, 207, 69, 0.98);
      --team-leading-glow1: rgba(255, 215, 90, 0.5);
      --team-leading-glow2: rgba(255, 200, 60, 0.38);
      --team-leading-score: #fff0a0;
      --team-leading-score-glow: rgba(255, 230, 120, 0.28);
      --crest-border: rgba(200, 225, 255, 0.55);
      --crest-leading-border: rgba(255, 235, 160, 0.75);
      --timer-label-color: rgba(140, 200, 255, 0.9);
      --app-frame-outer: rgb(5, 10, 20);
      --app-frame-bevel: max(4px, min(1.1vmin, 8px));
      --app-frame-radius: clamp(10px, 1.8vmin, 16px);
      --app-frame-border: 2px;
    }

    * {
      box-sizing: border-box;
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    html {
      height: 100%;
      background: var(--app-frame-outer);
    }

    body {
      margin: 0;
      min-height: 100dvh;
      height: 100%;
      background: var(--app-frame-outer);
      color: var(--text);
      font-family: "Segoe UI", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: max(var(--app-frame-bevel), env(safe-area-inset-top, 0px));
      padding-right: max(var(--app-frame-bevel), env(safe-area-inset-right, 0px));
      padding-bottom: max(var(--app-frame-bevel), env(safe-area-inset-bottom, 0px));
      padding-left: max(var(--app-frame-bevel), env(safe-area-inset-left, 0px));
      overflow: hidden;
    }

    .app {
      width: min(
        calc(100dvw - 2 * var(--app-frame-bevel)),
        calc((100dvh - 2 * var(--app-frame-bevel)) * 9 / 16)
      );
      aspect-ratio: 9 / 16;
      max-height: calc(100dvh - 2 * var(--app-frame-bevel));
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 10px;
      background: var(--bg);
      border-radius: var(--app-frame-radius);
      border: var(--app-frame-border) solid rgba(100, 195, 255, 0.32);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.65),
        inset 0 1px 0 rgba(255, 255, 255, 0.07),
        inset 0 -24px 48px rgba(0, 0, 0, 0.42);
      overflow: hidden;
    }

    .round-timer-bar {
      flex-shrink: 0;
      align-self: center;
      width: fit-content;
      min-width: 124px;
      max-width: calc(100% - 8px);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 6px 17px 8px;
      border-radius: 10px;
      background: var(--scorebox-bg);
      border: 3px solid var(--scorebox-border);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.1),
        0 0 14px var(--scorebox-glow),
        0 4px 16px rgba(0, 0, 0, 0.38);
      transition:
        border-color 0.28s ease,
        box-shadow 0.28s ease;
    }

    .round-timer-bar__inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
    }

    .round-timer-bar__label {
      font-size: clamp(8px, 1.9vw, 10px);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--timer-label-color);
      text-shadow: 0 0 10px var(--scorebox-glow);
    }

    .round-timer-bar__time {
      font-size: clamp(15px, 3.5vw, 21px);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #f2f8ff;
      text-shadow:
        0 0 14px rgba(100, 180, 255, 0.45),
        0 0 26px rgba(40, 120, 200, 0.2),
        0 1px 0 rgba(0, 0, 0, 0.55);
    }

    .round-timer-bar--warn {
      border-color: rgba(255, 210, 100, 0.88);
      box-shadow:
        inset 0 1px 0 rgba(255, 245, 210, 0.14),
        0 0 0 1px rgba(255, 215, 90, 0.35),
        0 0 24px rgba(255, 200, 70, 0.38),
        0 8px 28px rgba(0, 0, 0, 0.4);
    }

    .round-timer-bar--warn .round-timer-bar__label {
      color: rgba(255, 232, 180, 0.95);
      text-shadow: 0 0 16px rgba(255, 200, 100, 0.45);
    }

    .round-timer-bar--warn .round-timer-bar__time {
      color: var(--gold-soft);
      text-shadow:
        0 0 20px rgba(255, 220, 130, 0.6),
        0 0 36px rgba(255, 180, 40, 0.22),
        0 1px 0 rgba(0, 0, 0, 0.45);
    }

    .round-timer-bar--ended {
      border-color: rgba(90, 110, 130, 0.55);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.05),
        0 0 12px rgba(0, 0, 0, 0.35);
    }

    .round-timer-bar--ended .round-timer-bar__label {
      color: rgba(150, 165, 185, 0.5);
      text-shadow: none;
    }

    .round-timer-bar--ended .round-timer-bar__time {
      color: rgba(185, 195, 210, 0.52);
      text-shadow: none;
    }

    .scoreboard {
      flex: 0 0 auto;
      display: flex;
      flex-wrap: nowrap;
      gap: 7px;
      align-items: stretch;
      justify-content: stretch;
      background: transparent;
      border: none;
      padding: 0;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }

    .team {
      flex: 1 1 0;
      min-width: 0;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 9px;
      background: var(--scorebox-bg);
      border: 3px solid var(--scorebox-border);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.08),
        0 0 12px var(--scorebox-glow);
      transition:
        border-color 0.2s ease,
        box-shadow 0.2s ease,
        color 0.2s ease;
    }

    .team.leading {
      border: 3px solid var(--team-leading-border);
      box-shadow:
        0 0 0 1px var(--team-leading-glow1),
        0 0 18px var(--team-leading-glow2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .team.leading:not(.is-leader-handoff) {
      animation: arena5gen-leading-pulse 2.4s ease-in-out infinite;
    }

    .team .score {
      margin-left: auto;
      color: #f4f4f4;
      font-size: clamp(13px, 3vw, 19px);
      font-weight: 700;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
    }

    .team.leading .score {
      color: var(--team-leading-score);
      text-shadow: 0 0 10px var(--team-leading-score-glow);
    }

    @keyframes arena5gen-leading-pulse {
      0%,
      100% {
        box-shadow:
          0 0 0 1px var(--team-leading-glow1),
          0 0 18px var(--team-leading-glow2),
          inset 0 1px 0 rgba(255, 255, 255, 0.1);
      }
      50% {
        box-shadow:
          0 0 0 2px rgba(255, 230, 140, 0.55),
          0 0 26px rgba(255, 210, 90, 0.48),
          inset 0 1px 0 rgba(255, 255, 255, 0.14);
      }
    }

    @keyframes arena5gen-leader-handoff {
      from {
        transform: scale(0.98);
        filter: brightness(1.2);
      }
      to {
        transform: scale(1);
        filter: brightness(1);
      }
    }

    .team.leading.is-leader-handoff {
      animation: arena5gen-leader-handoff 0.5s ease-out;
    }

    .crest {
      position: relative;
      overflow: hidden;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      background: transparent;
      border: 2px solid var(--crest-border);
      box-shadow: none;
    }

    .team.leading .crest {
      border-color: var(--crest-leading-border);
    }

    .team.team--off {
      display: none !important;
    }

    .crest-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: none;
    }

    .crest.has-photo .crest-img {
      display: block;
    }

    .arena-wrap {
      position: relative;
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: transparent;
      border: none;
      border-radius: 0;
      overflow: hidden;
      box-shadow: none;
    }

    .round-end-overlay {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
      text-align: center;
      background: rgba(0, 0, 0, 0.72);
      color: #f2f2f2;
    }

    .round-end-overlay[hidden] {
      display: none;
    }

    .round-end-overlay .round-end-title {
      margin: 0;
      font-size: clamp(1.1rem, 4vw, 1.35rem);
      font-weight: 700;
      color: var(--gold-soft);
    }

    .round-end-overlay .round-end-winner {
      margin: 0;
      font-size: clamp(0.95rem, 3.5vw, 1.1rem);
      font-weight: 600;
    }

    .round-end-overlay .round-end-hint {
      margin: 0.35rem 0 0;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
    }

    canvas {
      width: 100%;
      max-height: 100%;
      height: auto;
      aspect-ratio: 1 / 1;
      display: block;
      background: #000000;
    }

    .settings-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.72);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(6px);
    }

    .settings-backdrop[hidden] {
      display: none;
    }

    .settings-panel {
      width: min(420px, 100%);
      max-height: min(90vh, 640px);
      overflow-y: auto;
      background: #121212;
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 14px;
      padding: 18px 18px 16px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55);
    }

    .settings-panel h2 {
      margin: 0 0 6px;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .settings-desc {
      margin: 0 0 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.55);
      line-height: 1.4;
    }

    .settings-subtitle {
      margin: 0 0 8px;
      font-size: 15px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.88);
    }

    .settings-input {
      width: 100%;
      margin-bottom: 10px;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.35);
      color: var(--text);
      font: inherit;
      font-size: 13px;
    }

    .settings-input:focus {
      outline: none;
      border-color: rgba(100, 170, 255, 0.55);
    }

    .settings-select {
      flex: 1 1 160px;
      min-width: 0;
      max-width: 100%;
      margin-bottom: 0;
      padding: 9px 11px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(0, 0, 0, 0.35);
      color: var(--text);
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .settings-select:focus {
      outline: none;
      border-color: rgba(100, 170, 255, 0.55);
    }

    .settings-count {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .settings-count__val {
      min-width: 2ch;
      text-align: center;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: 16px;
      color: #eaf4ff;
    }

    .settings-row--check {
      align-items: center;
    }

    .settings-row--check .settings-label {
      flex: 1 1 auto;
    }

    .settings-row--check input[type="checkbox"] {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
      accent-color: rgba(100, 170, 255, 0.9);
    }

    .settings-row--speed {
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
    }

    .settings-speed-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      gap: 10px;
    }

    .settings-speed-val {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      font-size: 14px;
      color: rgba(180, 220, 255, 0.95);
      flex-shrink: 0;
    }

    .settings-range {
      width: 100%;
      margin: 0;
      height: 28px;
      cursor: pointer;
      accent-color: rgba(100, 170, 255, 0.9);
    }

    .settings-tikfinity-block {
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-tikfinity-status {
      font-size: 12px;
      color: rgba(160, 200, 255, 0.65);
      margin-top: 8px;
      min-height: 1.2em;
    }

    .settings-row {
      position: relative;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 0;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    .settings-row .settings-label {
      flex: 1 1 auto;
      min-width: 120px;
      font-size: 13px;
      font-weight: 600;
    }

    .settings-row input[type="file"] {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .settings-row:last-of-type {
      border-bottom: none;
      margin-bottom: 8px;
      padding-bottom: 0;
    }

    .settings-btn {
      font: inherit;
      font-size: 13px;
      padding: 7px 12px;
      border-radius: 8px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      cursor: pointer;
    }

    .settings-btn:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .settings-btn.danger {
      border-color: rgba(255, 100, 100, 0.35);
      color: #ffb4b4;
    }

    .settings-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
    }

    .settings-close {
      font: inherit;
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      background: rgba(80, 160, 255, 0.25);
      color: #cfe6ff;
      cursor: pointer;
    }

    .settings-close:hover {
      background: rgba(80, 160, 255, 0.38);
    }

    .settings-gift-block {
      margin-top: 10px;
      padding-top: 12px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-gift-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px;
    }

    .settings-gift-toolbar .settings-input {
      flex: 1 1 140px;
      min-width: 0;
      margin-bottom: 0;
    }

    .settings-gift-team-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: min(54vh, 420px);
      overflow: auto;
      padding: 4px 2px 10px;
      -webkit-overflow-scrolling: touch;
    }

    .settings-team-assign {
      border-radius: 14px;
      border: 1px solid rgba(88, 176, 255, 0.28);
      background:
        linear-gradient(180deg, rgba(4, 11, 24, 0.98), rgba(2, 8, 18, 0.96)),
        rgba(255, 255, 255, 0.02);
      box-shadow:
        inset 0 1px 0 rgba(160, 220, 255, 0.08),
        0 0 0 1px rgba(24, 86, 140, 0.22);
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .settings-team-assign[hidden] {
      display: none;
    }

    .settings-team-assign-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(150, 195, 245, 0.82);
    }

    .settings-team-assign-head {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .settings-team-assign-select {
      flex: 1 1 auto;
      width: 100%;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(70, 175, 255, 0.45);
      background: rgba(2, 10, 22, 0.92);
      color: var(--text);
      cursor: pointer;
      box-shadow:
        inset 0 0 0 1px rgba(90, 205, 255, 0.14),
        0 0 0 1px rgba(34, 120, 180, 0.2);
    }

    .settings-team-assign-select:hover {
      border-color: rgba(102, 205, 255, 0.68);
      background: rgba(4, 14, 28, 0.96);
    }

    .settings-team-assign-select.is-open {
      border-color: rgba(82, 205, 255, 0.95);
      box-shadow:
        inset 0 0 0 1px rgba(120, 228, 255, 0.24),
        0 0 0 2px rgba(45, 160, 235, 0.22),
        0 0 18px rgba(28, 120, 180, 0.32);
    }

    .settings-team-assign-clear {
      flex: 0 0 auto;
      min-width: 88px;
    }

    .settings-team-assign-thumb,
    .settings-gift-option-thumb {
      width: 40px;
      height: 40px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.35);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: rgba(180, 210, 245, 0.72);
      font-size: 18px;
      font-weight: 700;
    }

    .settings-team-assign-thumb img,
    .settings-gift-option-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .settings-team-assign-meta {
      min-width: 0;
      flex: 1 1 auto;
      display: flex;
      flex-direction: row;
      align-items: center;
      text-align: left;
    }

    .settings-team-assign-name {
      font-size: 15px;
      font-weight: 700;
      color: #f8fbff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: 0.01em;
    }

    .settings-team-assign-diamond {
      display: none;
    }

    .settings-team-assign-caret {
      margin-left: auto;
      font-size: 11px;
      color: rgba(125, 195, 255, 0.76);
      flex-shrink: 0;
    }

    .settings-gift-options {
      display: flex;
      flex-direction: column;
      gap: 4px;
      max-height: 330px;
      overflow: auto;
      padding: 2px 2px 0;
      -webkit-overflow-scrolling: touch;
    }

    .settings-gift-option {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 10px;
      border: 1px solid rgba(255, 255, 255, 0.07);
      border-radius: 12px;
      background: rgba(3, 11, 22, 0.9);
      color: var(--text);
      cursor: pointer;
      text-align: left;
    }

    .settings-gift-option:hover {
      border-color: rgba(88, 176, 255, 0.4);
      background: rgba(6, 16, 30, 0.95);
    }

    .settings-gift-option.is-selected {
      border-color: rgba(78, 205, 255, 0.9);
      box-shadow: inset 0 0 0 1px rgba(110, 225, 255, 0.18);
    }

    .settings-gift-option-meta {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1 1 auto;
      width: 1%;
    }

    .settings-gift-option-name {
      min-width: 0;
      flex: 1 1 auto;
      font-size: 14px;
      font-weight: 700;
      color: #f5f9ff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .settings-gift-option-diamond {
      display: none;
    }

    .settings-music-block {
      margin-top: 4px;
    }

    .settings-music-player-card {
      margin-bottom: 14px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid rgba(110, 175, 235, 0.22);
      background: rgba(0, 0, 0, 0.22);
    }

    .settings-music-player-title {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: rgba(255, 240, 160, 0.95);
    }

    .settings-music-head {
      margin: 8px 0 4px;
      font-size: 12px;
      font-weight: 600;
      color: rgba(140, 200, 255, 0.88);
    }

    .settings-music-status {
      margin: 0 0 8px;
      font-size: 11px;
      color: rgba(200, 220, 255, 0.72);
      line-height: 1.35;
    }

    .settings-music-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .settings-music-line {
      display: flex;
      align-items: center;
      justify-content: space-between;

      giftHubGiftToTeam: null,

      /** @type {Map<number, string>} yerel hediye→takim (localStorage); sunucu eslemesinden once bakilir */
      localGiftToTeam: new Map(),
      musicObjectUrls: Object.create(null),
      musicPlaylistIndex: Object.fromEntries(TEAM_IDS.map((id) => [id, 0])),
      musicPlaybackTime: Object.create(null),
      leaderMusicPlayingId: null,
      leaderEndedHandler: null,
      leaderEndedAudio: null
    };

    function loadLocalGiftAssignmentsToState() {
      state.localGiftToTeam = new Map();
      try {
        const raw = localStorage.getItem(LOCAL_GIFT_ASSIGN_STORAGE_KEY);
        if (!raw) return;
        const o = JSON.parse(raw);
        if (!o || typeof o !== "object") return;
        Object.keys(o).forEach((k) => {
          const id = parseInt(k, 10);
          const v = o[k];
          if (!Number.isFinite(id)) return;
          if (v === "__default__") state.localGiftToTeam.set(id, GIFT_HUB_DEFAULT_TEAM_SENTINEL);
          else if (typeof v === "string" && TEAM_IDS.includes(v)) state.localGiftToTeam.set(id, v);
        });
      } catch (_e) {}
    }

    function saveLocalGiftAssignmentsFromState() {
      const o = {};
      state.localGiftToTeam.forEach((v, k) => {
        o[String(k)] = v === GIFT_HUB_DEFAULT_TEAM_SENTINEL ? "__default__" : v;
      });
      try {
        localStorage.setItem(LOCAL_GIFT_ASSIGN_STORAGE_KEY, JSON.stringify(o));
      } catch (_e) {}
    }

    function sanitizeLocalGiftAssignmentsForTeamUi() {
      let changed = false;
      state.localGiftToTeam.forEach((teamId, giftId) => {
        if (teamId === GIFT_HUB_DEFAULT_TEAM_SENTINEL) {
          state.localGiftToTeam.delete(giftId);
          changed = true;
        }
      });
      if (changed) saveLocalGiftAssignmentsFromState();
    }

    function giftHubImageFullUrl(imageUrl) {
      if (!imageUrl || typeof imageUrl !== "string") return "";
      const s = imageUrl.trim();
      if (/^[a-z][a-z0-9+.-]*:/i.test(s)) return s;
      try {
        if (window.__GEMTOK_GIFT_IMAGES_BASE__) {
          return String(window.__GEMTOK_GIFT_IMAGES_BASE__).replace(/\/?$/, "/") + (s.startsWith("/") ? s.slice(1) : s);
        }
      } catch (_e0) {}
      const base =
        typeof GemtokGiftHub !== "undefined" && GemtokGiftHub.hubBase
          ? GemtokGiftHub.hubBase()
          : String(window.__GEMTOK_GIFT_HUB_URL__ || "http://127.0.0.1:8787").replace(/\/$/, "");
      return base + (s.startsWith("/") ? s : "/" + s);
    }

    function bundledGiftImageFullUrl(fileName) {
      const f = String(fileName || "").trim();
      if (!f) return "";
      try {
        return new URL(GEMTOK_GIFT_LIST_IMAGE_BASE + f, window.location.href).href;
      } catch (_e) {
        return GEMTOK_GIFT_LIST_IMAGE_BASE + f;
      }
    }

    function normalizeBundledGiftRow(row) {
      if (!row || typeof row !== "object") return null;
      const id = Math.floor(Number(row.code != null ? row.code : row.tiktok_id));
      if (!Number.isFinite(id) || id <= 0) return null;
      const fileName = String(row.file || "").trim();
      return {
        tiktok_id: id,
        name: String(row.name || "").trim() || "Gift " + id,
        diamond_count: Math.max(0, Math.floor(Number(row.coins != null ? row.coins : row.diamond_count) || 0)),
        imageUrl: fileName ? bundledGiftImageFullUrl(fileName) : ""
      };
    }

    async function loadBundledGiftList() {
      try {
        if (Array.isArray(window.__GEMTOK_GIFT_LIST__) && window.__GEMTOK_GIFT_LIST__.length) {
          const src =
            typeof GemtokGiftCatalogFilter !== "undefined"
              ? GemtokGiftCatalogFilter.filterCatalogGifts(window.__GEMTOK_GIFT_LIST__)
              : window.__GEMTOK_GIFT_LIST__;
          return src.map(normalizeBundledGiftRow).filter(Boolean);
        }
      } catch (_e) {}
      try {
        const res = await fetch(GEMTOK_GIFT_LIST_JSON_URL, { cache: "no-store" });
        if (!res.ok) throw new Error("gift_list_http_" + res.status);
        const arr = await res.json();
        if (!Array.isArray(arr)) return [];
        const filtered =
          typeof GemtokGiftCatalogFilter !== "undefined"
            ? GemtokGiftCatalogFilter.filterCatalogGifts(arr)
            : arr;
        return filtered.map(normalizeBundledGiftRow).filter(Boolean);
      } catch (_e2) {
        return [];
      }
    }

    async function getGiftAssignCatalog(opts) {
      const force = !!(opts && opts.force);
      if (typeof GemtokGiftHub !== "undefined" && GemtokGiftHub.getAllGifts) {
        try {
          const gifts = await GemtokGiftHub.getAllGifts({ force });
          if (Array.isArray(gifts) && gifts.length) {
            return { gifts, source: "hub" };
          }
        } catch (_e) {}
      }
      const fallback = await loadBundledGiftList();
      return { gifts: fallback, source: fallback.length ? "bundled" : "none" };
    }

    let giftAssignSearchTimer = null;
    let openGiftAssignTeamId = null;

    function getAssignedGiftIdForTeam(teamId) {
      for (const [giftId, mappedTeamId] of state.localGiftToTeam.entries()) {
        if (mappedTeamId === teamId) return giftId;
      }
      return null;
    }

    function clearGiftAssignmentsForTeam(teamId) {
      const toDelete = [];
      state.localGiftToTeam.forEach((mappedTeamId, giftId) => {
        if (mappedTeamId === teamId) toDelete.push(giftId);
      });
      toDelete.forEach((giftId) => state.localGiftToTeam.delete(giftId));
    }

    function setAssignedGiftForTeam(teamId, giftId) {
      clearGiftAssignmentsForTeam(teamId);
      if (Number.isFinite(giftId) && giftId > 0) {
        state.localGiftToTeam.set(giftId, teamId);
      }
      saveLocalGiftAssignmentsFromState();
    }

    function getGiftCatalogImageUrl(giftRow) {
      if (!giftRow || typeof giftRow !== "object") return "";
      const d = giftRow.discoveredImageUrl;
      if (typeof d === "string" && d.trim()) return giftHubImageFullUrl(d);
      const u = giftRow.imageUrl || giftRow.image_url;
      if (typeof u === "string" && u.trim()) return giftHubImageFullUrl(u);
      const f = giftRow.image_file;
      if (typeof f === "string" && f.trim()) {
        return giftHubImageFullUrl("/gift-images/" + encodeURIComponent(f.trim()));
      }
      return "";
    }

    function giftDiamondCount(g) {
      if (!g || typeof g !== "object") return 0;
      const v = g.diamond_count != null ? g.diamond_count : g.diamond;
      return Math.max(0, Math.floor(Number(v) || 0));
    }

    function giftDisplayNameDiamond(g) {
      const name = g ? String(g.name || "").trim() : "";
      const d = giftDiamondCount(g);
      const base = name || (g && g.tiktok_id ? "Gift " + g.tiktok_id : "—");
      return base + " (" + d + ")";
    }

    function buildGiftThumb(imageUrl, fallbackText, className) {
      const wrap = document.createElement("span");
      wrap.className = className;
      const letter = (fallbackText || "G").slice(0, 1).toUpperCase();
      if (imageUrl) {
        const img = document.createElement("img");
        img.alt = "";
        img.loading = "lazy";
        img.decoding = "async";
        img.referrerPolicy = "no-referrer";
        img.src = imageUrl;
        img.addEventListener("error", () => {
          try {
            img.replaceWith(document.createTextNode(letter));
          } catch (_e) {
            wrap.textContent = letter;
          }
        });
        wrap.appendChild(img);
      } else {
        wrap.textContent = letter;
      }
      return wrap;
    }

    async function refreshGiftAssignGrid(opts) {
      const force = opts && opts.force;
      const grid = document.getElementById("settings-gift-assign-grid");
      const stat = document.getElementById("settings-gift-assign-status");
      if (!grid) return;
      if (stat) stat.textContent = "";
      try {
        const searchEl = document.getElementById("settings-gift-search");
        const search = (searchEl && searchEl.value) || "";
        const q = search.normalize("NFC").toLowerCase().trim();
        const catalog = await getGiftAssignCatalog({ force: !!force });
        const gifts = Array.isArray(catalog.gifts) ? catalog.gifts : [];
        const filtered = (!q
          ? gifts
          : gifts.filter((g) => {
              const nm = String(g.name || "").toLowerCase();
              const idStr = String(g.tiktok_id != null ? g.tiktok_id : "");
              return nm.includes(q) || idStr.includes(q);
            })
        ).sort((a, b) => {
          const da = giftDiamondCount(a);
          const db = giftDiamondCount(b);
          if (da !== db) return da - db;
          return String(a && a.name ? a.name : "").localeCompare(String(b && b.name ? b.name : ""), "tr");
        });
        grid.innerHTML = "";
        const frag = document.createDocumentFragment();
        const maxRows = 240;
        const filteredVisible = filtered.slice(0, maxRows);
        const active = activeTeams();
        if (openGiftAssignTeamId && !active.includes(openGiftAssignTeamId)) openGiftAssignTeamId = null;
        const giftById = new Map();
        gifts.forEach((giftRow) => {
          const id = Number(giftRow && giftRow.tiktok_id);
          if (Number.isFinite(id) && id > 0) giftById.set(id, giftRow);
        });

        active.forEach((teamId, idx) => {
          const teamWrap = document.createElement("section");
          teamWrap.className = "settings-team-assign";
          teamWrap.setAttribute("data-team-id", teamId);

          const title = document.createElement("div");
          title.className = "settings-team-assign-title";
          title.textContent = "TAKIM " + (idx + 1) + " → HEDİYE";

          const head = document.createElement("div");
          head.className = "settings-team-assign-head";

          const selectedGiftId = getAssignedGiftIdForTeam(teamId);
          const selectedGift = selectedGiftId != null ? giftById.get(selectedGiftId) || null : null;
          const selectedButton = document.createElement("button");
          selectedButton.type = "button";
          selectedButton.className = "settings-team-assign-select";
          selectedButton.setAttribute("aria-expanded", openGiftAssignTeamId === teamId ? "true" : "false");
          if (openGiftAssignTeamId === teamId) selectedButton.classList.add("is-open");
          selectedButton.addEventListener("click", () => {
            openGiftAssignTeamId = openGiftAssignTeamId === teamId ? null : teamId;
            void refreshGiftAssignGrid({ force: false });
          });

          selectedButton.appendChild(
            buildGiftThumb(
              selectedGift ? getGiftCatalogImageUrl(selectedGift) : "",
              selectedGift ? String(selectedGift.name || "?").slice(0, 1).toUpperCase() : "+",
              "settings-team-assign-thumb"
            )
          );

          const meta = document.createElement("span");
          meta.className = "settings-team-assign-meta";

          const name = document.createElement("span");
          name.className = "settings-team-assign-name";
          name.textContent = selectedGift
            ? giftDisplayNameDiamond(selectedGift)
            : selectedGiftId != null
              ? "Hediye #" + selectedGiftId + " (liste disi)"
              : "Hediye seç";

          const caret = document.createElement("span");
          caret.className = "settings-team-assign-caret";
          caret.setAttribute("aria-hidden", "true");
          caret.textContent = openGiftAssignTeamId === teamId ? "▲" : "▼";

          meta.appendChild(name);
          selectedButton.append(meta, caret);
          head.appendChild(selectedButton);

          const clearBtn = document.createElement("button");
          clearBtn.type = "button";
          clearBtn.className = "settings-btn danger settings-team-assign-clear";
          clearBtn.textContent = "Temizle";
          clearBtn.disabled = selectedGiftId == null;
          clearBtn.addEventListener("click", () => {
            clearGiftAssignmentsForTeam(teamId);
            saveLocalGiftAssignmentsFromState();
            openGiftAssignTeamId = null;
            if (stat) stat.textContent = "";
            void refreshGiftAssignGrid({ force: false });
          });
          head.appendChild(clearBtn);

          teamWrap.append(title, head);

          if (openGiftAssignTeamId === teamId) {
            const list = document.createElement("div");
            list.className = "settings-gift-options";
            if (!filteredVisible.length) {
              const empty = document.createElement("div");
              empty.className = "settings-gift-empty";
              empty.textContent = "Aramaya uygun hediye bulunamadi.";
              list.appendChild(empty);
            } else {
              filteredVisible.forEach((g) => {
                const id = Number(g.tiktok_id);
                if (!Number.isFinite(id) || id <= 0) return;
                const option = document.createElement("button");
                option.type = "button";
                option.className = "settings-gift-option";
                if (selectedGiftId === id) option.classList.add("is-selected");
                option.appendChild(
                  buildGiftThumb(
                    getGiftCatalogImageUrl(g),
                    String(g.name || "G").slice(0, 1).toUpperCase(),
                    "settings-gift-option-thumb"
                  )
                );
                const metaRow = document.createElement("span");
                metaRow.className = "settings-gift-option-meta";
                const nameRow = document.createElement("span");
                nameRow.className = "settings-gift-option-name";
                nameRow.textContent = giftDisplayNameDiamond(g);
                metaRow.appendChild(nameRow);
                option.appendChild(metaRow);
                option.addEventListener("click", () => {
                  setAssignedGiftForTeam(teamId, id);
                  if (stat) stat.textContent = "";
                  openGiftAssignTeamId = teamId;
                  void refreshGiftAssignGrid({ force: false });
                });
                list.appendChild(option);
              });
            }
            teamWrap.appendChild(list);
          }

          frag.appendChild(teamWrap);
        });
        grid.appendChild(frag);
        if (stat) stat.textContent = "";
      } catch (e) {
        if (stat) {
          stat.textContent =
            "Hediye listesi alinamadi: " + (e && e.message ? e.message : "bilinmeyen hata");
        }
        grid.innerHTML = "";
      }
    }

    TEAM_IDS.forEach((id) => {
      state.audios[id].loop = false;

    function randomVelocity(speed) {
      const angle = Math.random() * Math.PI * 2;
      return { vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed };
    }

    function getActiveTeamCount() {
      return Math.min(10, Math.max(2, Math.floor(state.activeTeamCount) || 5));
    }

    function activeTeams() {
      return TEAM_IDS.slice(0, getActiveTeamCount());
    }

    function loadArena5GenOptionsFromStorage() {
      state.shakeEnabled = true;
      try {
        const s = localStorage.getItem(SHAKE_STORAGE_KEY);
        if (s === "0" || s === "false") state.shakeEnabled = false;
      } catch (_e) {}
      state.arenaTheme = "default";
      try {
        const t = (localStorage.getItem(THEME_STORAGE_KEY) || "").trim();
        if (ARENA_THEME_COLORS[t]) state.arenaTheme = t;
      } catch (_e2) {}
      state.activeTeamCount = 5;
      try {
        const n = parseInt(localStorage.getItem(ACTIVE_COUNT_STORAGE_KEY), 10);
        if (Number.isFinite(n)) state.activeTeamCount = Math.min(10, Math.max(2, n));
      } catch (_e3) {}
      state.speedMultiplier = 1;
      try {
        const sp = parseFloat(localStorage.getItem(SPEED_STORAGE_KEY));
        if (Number.isFinite(sp)) state.speedMultiplier = clampSpeedMultiplier(sp);
      } catch (_e4) {}
      applyArenaThemeCssVars();

    function syncTeamVisibility() {
      const n = getActiveTeamCount();
      TEAM_IDS.forEach((id, i) => {
        teamEls[id].wrap.classList.toggle("team--off", i >= n);
      });
    }

    function layoutActiveBalls() {
      const { cx, cy, radius } = getArenaGeometry();
      const active = activeTeams();
      const n = active.length;
      const placeR = radius * 0.72;
      const startSpeed = 300;
      TEAM_IDS.forEach((id) => {
        const ball = state.balls[id];
        if (!active.includes(id)) {
          ball.x = cx;
          ball.y = cy;
          ball.vx = 0;
          ball.vy = 0;
          return;
        }
        const idx = active.indexOf(id);
        const a = -Math.PI / 2 + (idx * 2 * Math.PI) / Math.max(n, 1);
        ball.x = cx + Math.cos(a) * placeR;
        ball.y = cy + Math.sin(a) * placeR;
        Object.assign(ball, randomVelocity(startSpeed));
      });
    }

    loadArena5GenOptionsFromStorage();
    syncTeamVisibility();
    layoutActiveBalls();

    function getRoundMinutes() {
      let n = 10;
      try {
        const raw = localStorage.getItem(ROUND_STORAGE_KEY);
        if (raw != null && raw !== "") {
          const v = parseInt(raw, 10);
          if (Number.isFinite(v)) n = v;
        }
      } catch (_e) {}
      return Math.min(120, Math.max(1, n));
    }

    function persistRoundMinutes(v) {
      const clamped = Math.min(120, Math.max(1, Math.floor(Number.isFinite(v) ? v : 10)));
      try {
        localStorage.setItem(ROUND_STORAGE_KEY, String(clamped));
      } catch (_e) {}
      return clamped;
    }

    function persistShake(enabled) {
      state.shakeEnabled = !!enabled;
      try {
        localStorage.setItem(SHAKE_STORAGE_KEY, state.shakeEnabled ? "1" : "0");
      } catch (_e) {}
    }

    function persistTheme(themeId) {
      const t = ARENA_THEME_COLORS[themeId] ? themeId : "default";
      state.arenaTheme = t;
      try {
        localStorage.setItem(THEME_STORAGE_KEY, t);
      } catch (_e) {}
      applyArenaThemeCssVars();
    }

    function clampSpeedMultiplier(v) {
      const x = Number.isFinite(v) ? v : 1;
      return Math.min(3, Math.max(0.35, Math.round(x * 100) / 100));
    }

    function persistSpeedToStorage() {
      const v = clampSpeedMultiplier(state.speedMultiplier);
      state.speedMultiplier = v;
      try {
        localStorage.setItem(SPEED_STORAGE_KEY, String(v));
      } catch (_e) {}
      syncSpeedSettingsUi();
    }

    function syncSpeedSettingsUi() {
      if (!settingsSpeedRange || !settingsSpeedVal) return;
      const v = clampSpeedMultiplier(state.speedMultiplier);
      state.speedMultiplier = v;
      const pct = Math.round(v * 100);
      const snapped = Math.min(300, Math.max(35, Math.round(pct / 5) * 5));
      settingsSpeedRange.value = String(snapped);
      settingsSpeedVal.textContent = v.toFixed(2) + "x";
    }

    function setActiveTeamCount(n) {
      const v = Math.min(10, Math.max(2, Math.floor(n)));
      state.activeTeamCount = v;
      try {
        localStorage.setItem(ACTIVE_COUNT_STORAGE_KEY, String(v));
      } catch (_e) {}
      TEAM_IDS.forEach((id, i) => {
        if (i >= v) state.scores[id] = 0;
      });
      syncTeamVisibility();
      layoutActiveBalls();
      syncSmoothBallRadiiToTargets();
      if (settingsPlayerVal) settingsPlayerVal.textContent = String(v);
      renderTeamPhotoSettingsRows();
      renderTeamMusicSettingsRows();
      if (settingsBackdrop && !settingsBackdrop.hidden) {
        void refreshGiftAssignGrid({ force: false });
      }
      updateAll();
    }

    function formatRoundClock(ms) {
      const s = Math.max(0, Math.floor(ms / 1000));
      const m = Math.floor(s / 60);
      const r = s % 60;
      return m + ":" + String(r).padStart(2, "0");
    }

    function clearRoundRestartTimer() {
      if (state.roundRestartTimer != null) {
        clearTimeout(state.roundRestartTimer);
        state.roundRestartTimer = null;
      }
    }

    function getRoundWinnerLine() {
      const ids = activeTeams();
      const rows = ids.map((id) => ({ id, score: state.scores[id] }));
      const maxS = rows.length ? Math.max(...rows.map((r) => r.score)) : 0;
      if (maxS === 0) return "Skor yok.";
      const tops = rows.filter((r) => r.score === maxS);
      if (tops.length > 1) return "Beraberlik";
      return "Kazanan: " + TEAM_DISPLAY_NAMES[tops[0].id];
    }

    function onRoundTimeExpired() {
      if (state.roundFrozen) return;
      state.roundFrozen = true;
      state.roundEndTime = null;
      if (roundEndWinner) roundEndWinner.textContent = getRoundWinnerLine();
      if (roundEndOverlay) roundEndOverlay.hidden = false;
      if (roundTimerHud) {
        roundTimerHud.textContent = "0:00";
      }
      if (roundTimerBar) {
        roundTimerBar.classList.remove("round-timer-bar--warn");
        roundTimerBar.classList.add("round-timer-bar--ended");
      }
      clearRoundRestartTimer();
      state.roundRestartTimer = setTimeout(() => {
        state.roundRestartTimer = null;
        beginNewRound();
      }, 6500);
    }

    function beginNewRound() {
      clearRoundRestartTimer();
      state.roundFrozen = false;
      state.roundEndTime = Date.now() + getRoundMinutes() * 60 * 1000;
      TEAM_IDS.forEach((id) => {
        state.scores[id] = 0;
      });
      if (roundEndOverlay) roundEndOverlay.hidden = true;
      if (roundTimerBar) {
        roundTimerBar.classList.remove("round-timer-bar--ended", "round-timer-bar--warn");
      }
      if (roundTimerHud && state.roundEndTime) {
        roundTimerHud.textContent = formatRoundClock(state.roundEndTime - Date.now());
      }
      syncSmoothBallRadiiToTargets();
      updateAll();
    }

    function tickRoundHud() {
      if (!roundTimerHud) return;
      if (state.roundFrozen) return;
      if (!state.roundEndTime) {
        roundTimerHud.textContent = "--:--";
        return;
      }
      const rem = state.roundEndTime - Date.now();
      if (rem <= 0) {
        onRoundTimeExpired();
        return;
      }
      roundTimerHud.textContent = formatRoundClock(rem);
      if (roundTimerBar) roundTimerBar.classList.toggle("round-timer-bar--warn", rem <= 60 * 1000);
    }

    /** Hediye listesi / admin yoksa: sabit TikTok id ve isim eslemesi */
    function teamIdFromGiftDataLegacy(data) {
      const pick = (v) => (typeof v === "string" && v.trim() ? v.trim() : "");
      const pickSentDescribe = (info) => {
        const d = info && typeof info.describe === "string" ? info.describe.trim() : "";
        if (!d) return "";
        return d.replace(/^sent\s+/i, "").trim();
      };

      const rawGid =
        data.giftId != null
          ? data.giftId
          : data.giftID != null
            ? data.giftID
            : data.gift_id != null
              ? data.gift_id
              : data.extendedGiftInfo && data.extendedGiftInfo.giftId != null
                ? data.extendedGiftInfo.giftId
                : data.giftDetails && data.giftDetails.giftId != null
                  ? data.giftDetails.giftId
                  : data.gift && (data.gift.gift_id != null ? data.gift.gift_id : data.gift.id);
      const gid = rawGid != null && rawGid !== "" ? parseInt(String(rawGid), 10) : NaN;
      const idToTeam = {
        5655: "gs", // Rose
        5269: "fb", // TikTok (1 coin)
        5827: "amed", // Ice Cream Cone (TikTok catalog)
        6064: "bjk" // GG (yaygin catalog)
      };
      if (Number.isFinite(gid) && idToTeam[gid]) return idToTeam[gid];

      const raw =
        pick(data.giftName) ||
        pick(data.giftDetails && data.giftDetails.giftName) ||
        pick(data.gift && (data.gift.name || data.gift.giftName || data.gift.gift_name)) ||
        pickSentDescribe(data.extendedGiftInfo) ||
        "";

      const n = raw.normalize("NFC").toLowerCase();
      if (!n) return null;
      const spaced = n.replace(/\s+/g, " ").trim();
      const compact = spaced.replace(/ /g, "");

      if (spaced === "rose" || compact === "rose" || spaced === "gül" || compact === "gül") return "gs";
      if (spaced === "gg" || compact === "gg") return "bjk";
      if (spaced === "tiktok" || spaced === "tik tok" || compact === "tiktok") return "fb";
      if (
        spaced === "ice cream cone" ||
        compact === "icecreamcone" ||
        compact === "icecream" ||
        spaced === "ice cream" ||
        (spaced.includes("ice cream") && spaced.includes("cone")) ||
        (spaced.includes("icecream") && spaced.includes("cone")) ||
        n.includes("dondurma") ||
        (n.includes("külah") && n.includes("dondurma")) ||
        (n.includes("kulah") && n.includes("dondurma"))
      ) {
        return "amed";
      }
      if (spaced === "pop" || /^pop\b/i.test(raw)) return "ts";

      return null;
    }

    /** Once yerel ayar, sonra Gift Hub `arena5gen` eslemesi; yoksa legacy. */
    function teamIdFromGiftData(data) {
      let gid = null;
      if (typeof GemtokGiftHub !== "undefined" && GemtokGiftHub.extractGiftIdFromEvent) {
        gid = GemtokGiftHub.extractGiftIdFromEvent(data);
      }
      if (gid != null && Number.isFinite(gid) && state.localGiftToTeam.has(gid)) {
        let tid = state.localGiftToTeam.get(gid);
        if (tid === GIFT_HUB_DEFAULT_TEAM_SENTINEL) {
          const act = activeTeams();
          if (act.length) return act[0];
        } else if (activeTeams().includes(tid)) return tid;
      }
      if (
        gid != null &&
        Number.isFinite(gid) &&
        state.giftHubGiftToTeam instanceof Map &&
        state.giftHubGiftToTeam.has(gid)
      ) {
        let tid = state.giftHubGiftToTeam.get(gid);
        if (tid === GIFT_HUB_DEFAULT_TEAM_SENTINEL) {
          const act = activeTeams();
          if (act.length) return act[0];
        } else if (activeTeams().includes(tid)) return tid;
      }
      return teamIdFromGiftDataLegacy(data);
    }

    function applyTikfinityPoints(teamId, points, withBurst) {
      if (state.roundFrozen) return;
      if (!activeTeams().includes(teamId)) return;
      const p = Math.max(0, Math.floor(points));
      if (p < 1) return;
      if (!state.audioReady) initAudio();
      state.scores[teamId] += p;
      if (withBurst !== false) spawnGiftBurst(teamId, p);
      updateAll();
    }

    /** TikTok streak (giftType 1): yalnizca repeatEnd=true tek olay; ara combo tiklari sayilmaz */
    function isTikfinityGiftEventInProgress(data) {
      const giftType = Number(
        data.giftType ?? data.gift_type ?? data.gift?.gift_type ?? data.gift?.giftType ?? 0
      );
      const repeatEnd = data.repeatEnd ?? data.repeat_end;
      if (giftType === 1) {
        return !(repeatEnd === true || repeatEnd === 1 || repeatEnd === "1");
      }
      return repeatEnd === false || repeatEnd === 0 || repeatEnd === "0";
    }

    function resolveGiftDiamondPerUnit(data) {
      const direct = Math.floor(
        Number(
          data.diamondCount ??
            data.diamond_count ??
            data.gift?.diamond_count ??
            data.gift?.diamondCount ??
            data.extendedGiftInfo?.diamondCount ??
            data.giftDetails?.diamondCount ??
            0
        )
      );
      if (direct > 0) return direct;
      return 1;
    }

    function resolveGiftComboCount(data) {
      const raw = Math.floor(
        Number(
          data.repeatCount ??
            data.repeat_count ??
            data.giftCombo ??
            data.comboCount ??
            data.groupCount ??
            data.gift?.repeat_count ??
            1
        )
      );
      return Math.min(120, Math.max(1, Number.isFinite(raw) && raw > 0 ? raw : 1));
    }

    function computeTikfinityGiftPoints(data) {
      const diamondPerUnit = resolveGiftDiamondPerUnit(data);
      const combo = resolveGiftComboCount(data);
      return Math.min(60, Math.max(1, diamondPerUnit * combo));
    }

    function handleGemTokPortalGift(p) {
      if (!p || typeof p !== "object") return;
      if (String(p.type || "").toLowerCase() !== "gift") return;
      const msg = { event: "gift", data: p };
      handleTikfinityParsed(msg);
    }

    function handleTikfinityParsed(msg) {
      const ev = String(msg.event || msg.type || "").toLowerCase();
      if (ev !== "gift") return;

      const data = msg.data != null && typeof msg.data === "object" ? msg.data : msg;

      if (isTikfinityGiftEventInProgress(data)) return;
      const giftTeam = teamIdFromGiftData(data);
      if (!giftTeam) return;

      applyTikfinityPoints(giftTeam, computeTikfinityGiftPoints(data));
    }

    function handleTikfinityRawLine(line) {
      let msg;
      try {
        msg = JSON.parse(line);
      } catch (_e) {
        return;
      }
      if (!msg || typeof msg !== "object") return;
      handleTikfinityParsed(msg);
    }

    function scheduleTikfinityFlush() {
      if (state.tikfinity.flushScheduled) return;
      state.tikfinity.flushScheduled = true;
      requestAnimationFrame(() => {
        state.tikfinity.flushScheduled = false;
        let n = 0;
        while (n < TIKFINITY_MAX_PER_FRAME && state.tikfinity.queue.length) {
          const raw = state.tikfinity.queue.shift();
          if (typeof raw !== "string") {
            n++;
            continue;
          }
          const chunks = String(raw)
            .split(/\r?\n/)
            .map((s) => s.trim())
            .filter(Boolean);
          for (const c of chunks) handleTikfinityRawLine(c);
          n++;
        }
        if (state.tikfinity.queue.length) scheduleTikfinityFlush();
      });
    }

    function disconnectTikfinity(opts) {
      const intentional = opts && opts.intentional;
      if (state.tikfinity.bridgeUnsub) {
        try {
          state.tikfinity.bridgeUnsub();
        } catch (_e) {}
        state.tikfinity.bridgeUnsub = null;
      }
      if (state.tikfinity.portalHudTimer) {
        clearInterval(state.tikfinity.portalHudTimer);
        state.tikfinity.portalHudTimer = null;
      }
      if (state.tikfinity.reconnectTimer) {
        clearTimeout(state.tikfinity.reconnectTimer);
        state.tikfinity.reconnectTimer = null;
      }
      const w = state.tikfinity.ws;
      state.tikfinity.ws = null;
      state.tikfinity.intentionalClose = !!intentional;
      if (w && (w.readyState === WebSocket.OPEN || w.readyState === WebSocket.CONNECTING)) {
        try {
          w.close();
        } catch (_e) {}
      }
    }

    function scheduleTikfinityReconnect() {
      if (isTikfinityAutoWsDisabled()) return;
      if (state.tikfinity.reconnectTimer) return;
      const delay = 3000 + Math.random() * 2500;
      state.tikfinity.reconnectTimer = setTimeout(() => {
        state.tikfinity.reconnectTimer = null;
        connectTikfinity({ bypassDisable: true });
      }, delay);
    }

    function connectTikfinity(opts) {
      const bypass = opts && opts.bypassDisable;
      if (!bypass && isTikfinityAutoWsDisabled()) {
        setTikfinityStatus("Otomatik WebSocket kapali (?tikfinity=0). Ayarlardan baglan.");
        return;
      }
      if (typeof GemTokLiveGameBridge !== "undefined" && typeof GemTokTikTokLive !== "undefined") {
        disconnectTikfinity({ intentional: true });
        const hub = window.__GEMTOK_GIFT_HUB_URL__ || "http://127.0.0.1:8787";
        if (GemTokLiveGameBridge.ensure({ hubBase: hub, showHud: false })) {
          state.tikfinity.bridgeUnsub = GemTokLiveGameBridge.onPayload((p) => handleGemTokPortalGift(p));
          if (state.tikfinity.portalHudTimer) clearInterval(state.tikfinity.portalHudTimer);
          state.tikfinity.portalHudTimer = setInterval(() => {
            try {
              const st = GemTokTikTokLive.getConnectionState?.();
              if (!st) return;
              const u = st.url || getTikfinityWsUrl();
              if (st.state === "connected") setTikfinityStatus("GemTok koprusu bagli: " + u);
              else if (st.state === "reconnecting") setTikfinityStatus("GemTok koprusu yeniden baglaniyor…");
              else if (st.state === "connecting") setTikfinityStatus("GemTok koprusu baglaniyor…");
              else setTikfinityStatus("GemTok koprusu bekleniyor…");
            } catch (_e2) {}
          }, 600);
          return;
        }
      }
      disconnectTikfinity({ intentional: true });
      const url = getTikfinityWsUrl();
      setTikfinityStatus("Baglaniyor…");
      let ws;
      try {
        ws = new WebSocket(url);
      } catch (_e) {
        setTikfinityStatus("Baglanti basarisiz, yeniden denenecek.");
        scheduleTikfinityReconnect();
        return;
      }
      state.tikfinity.ws = ws;
      state.tikfinity.intentionalClose = false;
      ws.onopen = () => {
        setTikfinityStatus("Bagli: " + url);
      };
      ws.onmessage = (ev) => {
        state.tikfinity.queue.push(ev.data);
        scheduleTikfinityFlush();
      };
      ws.onclose = () => {
        if (state.tikfinity.ws !== ws) return;
        state.tikfinity.ws = null;
        const skipReconnect = state.tikfinity.intentionalClose;
        state.tikfinity.intentionalClose = false;
        if (skipReconnect) return;
        setTikfinityStatus("Baglanti koptu, yeniden deneniyor…");
        scheduleTikfinityReconnect();
      };
      ws.onerror = () => {
        try {
          ws.close();
        } catch (_e) {}
      };
    }

    function fileToResizedDataUrl(file, maxDim, cb) {
      const reader = new FileReader();
      reader.onerror = () => cb(null);
      reader.onload = () => {
        const img = new Image();
        img.onerror = () => cb(null);
        img.onload = () => {
          const w = img.naturalWidth;
          const h = img.naturalHeight;
          const sc = Math.min(1, maxDim / Math.max(w, h));
          const cw = Math.max(1, Math.round(w * sc));
          const ch = Math.max(1, Math.round(h * sc));
          const c = document.createElement("canvas");
          c.width = cw;
          c.height = ch;
          c.getContext("2d").drawImage(img, 0, 0, cw, ch);
          try {
            cb(c.toDataURL("image/jpeg", 0.88));
          } catch (_e) {
            cb(null);
          }
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    }

    const MUSIC_DB_NAME = "arena5gen_team_music_v1";
    const MUSIC_STORE = "tracks";
    const MUSIC_SLOT_COUNT = 4;
    let musicDbPromise = null;

    function openTeamMusicDB() {
      if (!musicDbPromise) {
        musicDbPromise = new Promise((resolve, reject) => {
          const req = indexedDB.open(MUSIC_DB_NAME, 1);
          req.onupgradeneeded = (e) => {
            const db = e.target.result;
            if (!db.objectStoreNames.contains(MUSIC_STORE)) {
              db.createObjectStore(MUSIC_STORE, { keyPath: "teamId" });
            }
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }
      return musicDbPromise;
    }

    async function idbGetTeamBlobs(teamId) {
      const base = [null, null, null, null];
      const db = await openTeamMusicDB();
      const row = await new Promise((resolve, reject) => {
        const tx = db.transaction(MUSIC_STORE, "readonly");
        const q = tx.objectStore(MUSIC_STORE).get(teamId);
        q.onsuccess = () => resolve(q.result || null);
        q.onerror = () => reject(q.error);
      });
      if (!row) return base;
      if (Array.isArray(row.blobs)) {
        for (let i = 0; i < MUSIC_SLOT_COUNT && i < row.blobs.length; i++) {
          const b = row.blobs[i];
          if (b instanceof Blob && b.size > 0) base[i] = b;
        }
        return base;
      }
      if (row.blob instanceof Blob && row.blob.size > 0) base[0] = row.blob;
      return base;
    }

    async function idbPutTeamBlobs(teamId, blobs) {
      const normalized = [0, 1, 2, 3].map((i) => {
        const b = blobs[i];
        return b instanceof Blob && b.size > 0 ? b : null;
      });
      if (!normalized.some(Boolean)) {
        await idbDeleteTeamMusic(teamId);
        return;
      }
      const db = await openTeamMusicDB();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(MUSIC_STORE, "readwrite");
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.objectStore(MUSIC_STORE).put({ teamId, blobs: normalized });
      });
    }

    async function idbDeleteTeamMusic(teamId) {
      const db = await openTeamMusicDB();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(MUSIC_STORE, "readwrite");
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
        tx.objectStore(MUSIC_STORE).delete(teamId);
      });
    }

    function revokeTeamMusicUrls(teamId) {
      const u = state.musicObjectUrls[teamId];
      if (Array.isArray(u)) {
        u.forEach((url) => {
          if (url) {
            try {
              URL.revokeObjectURL(url);
            } catch (_e) {}
          }
        });
      } else if (typeof u === "string") {
        try {
          URL.revokeObjectURL(u);
        } catch (_e) {}
      }
      delete state.musicObjectUrls[teamId];
    }

    function bindTeamMusic(teamId, blobs) {
      const a = state.audios[teamId];
      revokeTeamMusicUrls(teamId);
      a.pause();
      const slots = [0, 1, 2, 3].map((i) =>
        blobs[i] instanceof Blob && blobs[i].size > 0 ? blobs[i] : null
      );
      const urls = slots.map((b) => (b ? URL.createObjectURL(b) : null));
      state.musicObjectUrls[teamId] = urls;
      const filled = [];
      urls.forEach((url, j) => {
        if (url) filled.push(j);
      });
      if (filled.length === 0) {
        a.removeAttribute("src");
        a.src = "";
        a.loop = false;
        delete state.musicPlaylistIndex[teamId];
        if (state.musicPlaybackTime) delete state.musicPlaybackTime[teamId];
        return;
      }
      const firstIdx = filled[Math.floor(Math.random() * filled.length)];
      a.src = urls[firstIdx];
      state.musicPlaylistIndex[teamId] = firstIdx;
      a.loop = false;
      a.load();
      if (!state.musicPlaybackTime) state.musicPlaybackTime = Object.create(null);
      state.musicPlaybackTime[teamId] = { t: 0, key: urls[firstIdx] || "" };
    }

    function audioTrackKey(a) {
      if (!a) return "";
      return String(a.currentSrc || a.src || "");
    }

    function saveMusicPlaybackPosition(teamId) {
      const a = state.audios[teamId];
      if (!a || !a.src) return;
      const key = audioTrackKey(a);
      if (!key) return;
      if (!state.musicPlaybackTime) state.musicPlaybackTime = Object.create(null);
      state.musicPlaybackTime[teamId] = {
        t: Math.max(0, Number(a.currentTime) || 0),
        key
      };
    }

    function restoreMusicPlaybackPosition(teamId) {
      const a = state.audios[teamId];
      const saved = state.musicPlaybackTime?.[teamId];
      if (!a || !saved || !saved.key) return;
      if (audioTrackKey(a) !== saved.key) return;
      if (saved.t < 0.02) return;
      const applySeek = () => {
        try {
          const dur = Number(a.duration);
          let t = saved.t;
          if (Number.isFinite(dur) && dur > 0) t = Math.min(t, Math.max(0, dur - 0.05));
          a.currentTime = t;
        } catch (_e) {}
      };
      if (a.readyState >= 1) applySeek();
      else a.addEventListener("loadedmetadata", applySeek, { once: true });
    }

    function teardownLeaderEndedListener() {
      const la = state.leaderEndedAudio;
      const lh = state.leaderEndedHandler;
      if (la && lh) {
        try {
          la.removeEventListener("ended", lh);
        } catch (_e) {}
      }
      state.leaderEndedAudio = null;
      state.leaderEndedHandler = null;
    }

    function wireLeaderMusicEndedHandler(leader, a) {
      teardownLeaderEndedListener();
      const uArr = state.musicObjectUrls[leader];
      const trackCount = Array.isArray(uArr) ? uArr.filter(Boolean).length : 0;
      if (trackCount <= 1) {
        a.loop = trackCount === 1;
        return;
      }
      a.loop = false;
      const handler = () => {
        const arr = state.musicObjectUrls[leader];
        if (!Array.isArray(arr)) return;
        let cur = state.musicPlaylistIndex[leader];
        if (typeof cur !== "number" || cur < 0) cur = 0;
        const filled = [];
        arr.forEach((url, j) => {
          if (url) filled.push(j);
        });
        if (filled.length === 0) return;
        let nextIdx;
        if (filled.length === 1) {
          nextIdx = filled[0];
        } else {
          const others = filled.filter((j) => j !== cur);
          const pool = others.length ? others : filled;
          nextIdx = pool[Math.floor(Math.random() * pool.length)];
        }
        state.musicPlaylistIndex[leader] = nextIdx;
        a.src = arr[nextIdx];
        if (!state.musicPlaybackTime) state.musicPlaybackTime = Object.create(null);
        state.musicPlaybackTime[leader] = { t: 0, key: arr[nextIdx] || "" };
        a.load();
        void a.play();
      };
      state.leaderEndedHandler = handler;
      state.leaderEndedAudio = a;
      a.addEventListener("ended", handler);
    }

      else await playLeaderSong(getLeader());
    }

    async function loadTeamMusicFromIDB() {
      for (const id of TEAM_IDS) {
        try {
          const blobs = await idbGetTeamBlobs(id);
          if (blobs.some(Boolean)) bindTeamMusic(id, blobs);
        } catch (_e) {}
      }
      if (state.audioReady) void playLeaderSong(getLeader());
    }

    const ARENA_SIDES = 8;
    /** drawTeamBadge uses octagon frame circum ≈ r+6; physics must use same outer extent + pad or avatars clip past the ring. */
    const ARENA_BADGE_FRAME_OUT = 6;
    const ARENA_BADGE_PHYS_PAD = 4;
    function badgeWallRadius(r) {
      return r + ARENA_BADGE_FRAME_OUT + ARENA_BADGE_PHYS_PAD;
    }

    function getArenaGeometry() {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const radius = Math.min(canvas.width, canvas.height) / 2 - 16;
      return { cx, cy, radius };
    }

    function getArenaVertices(cx, cy, circumRadius) {
      const verts = [];
      for (let i = 0; i < ARENA_SIDES; i++) {
        const a = -Math.PI / 2 + (i * 2 * Math.PI) / ARENA_SIDES;
        verts.push({
          x: cx + Math.cos(a) * circumRadius,
          y: cy + Math.sin(a) * circumRadius
        });
      }
      return verts;
    }

    function pointInConvexPolygon(px, py, verts) {
      let sign = 0;
      const n = verts.length;
      for (let i = 0; i < n; i++) {
        const a = verts[i];
        const b = verts[(i + 1) % n];
        const cross = (b.x - a.x) * (py - a.y) - (b.y - a.y) * (px - a.x);
        if (Math.abs(cross) < 1e-8) continue;
        const s = cross > 0 ? 1 : -1;
        if (sign === 0) sign = s;
        else if (s !== sign) return false;
      }
      return sign !== 0;
    }

    function resolveArenaWall(ball, r, verts, cx, cy, wallPasses = 9) {
      const n = verts.length;
      for (let pass = 0; pass < wallPasses; pass++) {
        for (let i = 0; i < n; i++) {
          const a = verts[i];
          const b = verts[(i + 1) % n];
          const ex = b.x - a.x;
          const ey = b.y - a.y;
          const elen = Math.hypot(ex, ey) || 1;
          const edx = ex / elen;
          const edy = ey / elen;
          let nx = -edy;
          let ny = edx;
          const midx = (a.x + b.x) * 0.5;
          const midy = (a.y + b.y) * 0.5;
          if ((cx - midx) * nx + (cy - midy) * ny < 0) {
            nx = -nx;
            ny = -ny;
          }
          const apx = ball.x - a.x;
          const apy = ball.y - a.y;
          const along = apx * edx + apy * edy;
          if (along < 0 || along > elen) continue;
          const perp = apx * nx + apy * ny;
          if (perp >= r) continue;
          const push = r - perp;
          ball.x += nx * push;
          ball.y += ny * push;
          const vn = ball.vx * nx + ball.vy * ny;
          if (vn < 0) {
            const e = ARENA5GEN.physics.wallRestitution;
            ball.vx -= (1 + e) * vn * nx;
            ball.vy -= (1 + e) * vn * ny;
          }
        }
      }
      if (!pointInConvexPolygon(ball.x, ball.y, verts)) {
        ball.x += (cx - ball.x) * 0.08;
        ball.y += (cy - ball.y) * 0.08;
      }
    }

    function getLeader() {
      const ids = activeTeams();
      const rows = ids.map((id) => ({ id, score: state.scores[id] }));
      const maxScore = Math.max(0, ...rows.map((t) => t.score));
      const leaders = rows.filter((t) => t.score === maxScore);
      if (leaders.length !== 1) return "none";
      return leaders[0].id;
    }

    /** Skora göre anında hedef yarıçap (çizim/fizik hedefi). */
    function getTargetBallRadii() {
      const ids = activeTeams();
      const rawScores = ids.map((id) => state.scores[id]);
      const maxS = rawScores.length ? Math.max(...rawScores) : 0;
      const G = ARENA5GEN.growth;
      const minR = G.minRadius;
      const maxR = G.maxRadius;
      const leader = getLeader();

      if (maxS === 0) {
        const na = Math.max(2, ids.length);
        const idleR = na >= 10 ? 40 : na >= 9 ? 44 : na >= 8 ? 48 : na >= 7 ? 52 : na >= 6 ? 58 : 72;
        return {
          leader,
          radii: Object.fromEntries(
            TEAM_IDS.map((id) => [id, ids.includes(id) ? idleR : 0])
          )
        };
      }

      const ms = Math.max(1, maxS);
      const toR = (raw) => {
        const s = Math.max(0, raw);
        const rel = Math.sqrt((s + 1) / (ms + 1));
        const dim = 1 - Math.exp(-Math.sqrt(s + 1) / G.sqrtTau);
        const t = G.blendRelative * rel + (1 - G.blendRelative) * dim;
        return minR + (maxR - minR) * Math.min(1, Math.max(0, t));
      };
      const radii = Object.fromEntries(
        TEAM_IDS.map((id) => [id, ids.includes(id) ? toR(state.scores[id]) : 0])
      );
      return { leader, radii };
    }

    function syncDisplayScoresFromState() {
      TEAM_IDS.forEach((id) => {
        state.displayScores[id] = state.scores[id];
        if (teamEls[id] && teamEls[id].score) {
          teamEls[id].score.textContent = String(state.scores[id]);
        }
      });
    }

    function syncSmoothBallRadiiToTargets() {
      const t = getTargetBallRadii();
      const n = ARENA5GEN.smoothing.steps;
      TEAM_IDS.forEach((id) => {
        const g = t.radii[id];
        state.smoothBallRadii[id] = g;
        const rm = state.ballRadiusRamp[id];
        rm.from = g;
        rm.goal = g;
        rm.t = n;
      });
      syncDisplayScoresFromState();
    }

    /** Skor hedefi değişince yumuşak easing ile ~500 karede hedef boy. */
    function tickSmoothBallRadii(_dtSec) {
      const { radii: targetMap } = getTargetBallRadii();
      const active = new Set(activeTeams());
      const n = ARENA5GEN.smoothing.steps;
      TEAM_IDS.forEach((id) => {
        const rm = state.ballRadiusRamp[id];
        const target = active.has(id) ? targetMap[id] : 0;
        if (!active.has(id)) {
          state.smoothBallRadii[id] = 0;
          rm.from = 0;
          rm.goal = 0;
          rm.t = n;
          return;
        }
        if (Math.abs(rm.goal - target) > 1e-4) {
          rm.from = state.smoothBallRadii[id] || 0;
          rm.goal = target;
          rm.t = 0;
        }
        rm.t = Math.min(rm.t + 1, n);
        const uLin = rm.t / n;
        const u = ARENA5GEN.smoothing.easeOutCubic(uLin);
        state.smoothBallRadii[id] = rm.from + (rm.goal - rm.from) * u;
      });
    }

    function getBallRadii() {
      const t = getTargetBallRadii();
      const ids = activeTeams();
      const radii = Object.fromEntries(
        TEAM_IDS.map((id) => [id, ids.includes(id) ? state.smoothBallRadii[id] : 0])
      );
      return { leader: t.leader, radii };
    }

    function drawArenaPath(verts) {
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      for (let i = 1; i < verts.length; i++) ctx.lineTo(verts[i].x, verts[i].y);
      ctx.closePath();
    }

    function drawArenaRing() {
      const { cx, cy, radius } = getArenaGeometry();
      const verts = getArenaVertices(cx, cy, radius);
      const pulse = (Math.sin(performance.now() * 0.006) + 1) / 2;
      const glowBlur = 14 + pulse * 30;
      const lineAlpha = 0.5 + pulse * 0.45;
      const d = ARENA_THEME_COLORS[state.arenaTheme] || ARENA_THEME_COLORS.default;

      ctx.save();
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Kenardan ice dogru ambient isik (ic arena)
      ctx.save();
      drawArenaPath(verts);
      ctx.clip();
      const rim = 0.06 + pulse * 0.04;
      const innerGlow = ctx.createRadialGradient(cx, cy, radius * 0.12, cx, cy, radius * 0.98);
      innerGlow.addColorStop(0, `rgba(${d.g0}, 1)`);
      innerGlow.addColorStop(0.38, `rgba(${d.g1}, 0.94)`);
      innerGlow.addColorStop(0.68, `rgba(${d.g2}, ${0.42 + pulse * 0.1})`);
      innerGlow.addColorStop(0.9, `rgba(${d.g3}, ${0.28 + pulse * 0.12})`);
      innerGlow.addColorStop(1, `rgba(${d.g4}, ${0.16 + rim})`);
      ctx.fillStyle = innerGlow;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const wash = ctx.createRadialGradient(cx, cy, radius * 0.55, cx, cy, radius * 1.02);
      wash.addColorStop(0, "rgba(255, 255, 255, 0)");
      wash.addColorStop(0.85, `rgba(${d.wash85}, 0)`);
      wash.addColorStop(1, `rgba(${d.wash100}, ${0.07 + pulse * 0.04})`);
      ctx.globalCompositeOperation = "screen";
      ctx.fillStyle = wash;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.globalCompositeOperation = "source-over";
      ctx.restore();

      drawArenaPath(verts);
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.strokeStyle = `rgba(${d.strokeW}, ${lineAlpha * 0.42})`;
      ctx.lineWidth = 24;
      ctx.shadowColor = `rgba(${d.shadow}, 0.92)`;
      ctx.shadowBlur = glowBlur;
      ctx.stroke();
      ctx.shadowBlur = 0;

      drawArenaPath(verts);
      ctx.strokeStyle = `rgba(${d.strokeN}, ${0.78 + pulse * 0.12})`;
      ctx.lineWidth = 5.5;
      ctx.stroke();

      ctx.restore();
    }

    function drawStar(cx, cy, outerR, color) {
      const innerR = outerR * 0.42;
      ctx.save();
      ctx.fillStyle = color;
      ctx.beginPath();
      for (let i = 0; i < 10; i++) {
        const angle = -Math.PI / 2 + (Math.PI * i) / 5;
        const rr = i % 2 === 0 ? outerR : innerR;
        const x = cx + Math.cos(angle) * rr;
        const y = cy + Math.sin(angle) * rr;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }

    function drawRegularOctagonPath(cx, cy, circumRadius) {
      const verts = getArenaVertices(cx, cy, circumRadius);
      ctx.beginPath();
      ctx.moveTo(verts[0].x, verts[0].y);
      for (let i = 1; i < verts.length; i++) {
        ctx.lineTo(verts[i].x, verts[i].y);
      }
      ctx.closePath();
    }

    function drawEmptyOctagonFrame(x, y, r) {
      const frameCircum = r + 6;
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.9)";
      ctx.lineWidth = 2;
      drawRegularOctagonPath(x, y, frameCircum);
      ctx.stroke();
      ctx.restore();
    }

    function drawTeamBadge(id, x, y, r, isLeader) {
      const pulse = isLeader ? 1 + 0.035 * Math.sin(performance.now() * 0.0038) : 1;
      const clipCircum = (r + 6) * 0.9 * pulse;
      const im = state.teamCanvasImages[id];
      if (isLeader) {
        ctx.save();
        const g = ctx.createRadialGradient(x, y, r * 0.2, x, y, (r + 10) * pulse);
        g.addColorStop(0, "rgba(255, 230, 140, 0.22)");
        g.addColorStop(0.55, "rgba(255, 200, 60, 0.12)");
        g.addColorStop(1, "rgba(255, 180, 40, 0)");
        ctx.fillStyle = g;
        drawRegularOctagonPath(x, y, (r + 8) * pulse);
        ctx.fill();
        ctx.strokeStyle = "rgba(255, 215, 90, 0.92)";
        ctx.lineWidth = 3;
        ctx.shadowColor = "rgba(255, 200, 80, 0.75)";
        ctx.shadowBlur = 18;
        drawRegularOctagonPath(x, y, (r + 6) * pulse);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.restore();
      }
      if (im && im.complete && im.naturalWidth > 0) {
        ctx.save();
        drawRegularOctagonPath(x, y, clipCircum);
        ctx.clip();
        const R = clipCircum;
        const iw = im.naturalWidth;
        const ih = im.naturalHeight;
        const scale = Math.max((2 * R) / iw, (2 * R) / ih);
        const dw = iw * scale;
        const dh = ih * scale;
        ctx.drawImage(im, x - dw / 2, y - dh / 2, dw, dh);
        ctx.restore();
      }
      drawEmptyOctagonFrame(x, y, r * pulse);
      if (isLeader) drawLeaderCrown(x, y, r * pulse);
    }

    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const nt = activeTeams().length;
      const shakeScale = nt >= 3 ? 2.6 : 6;
      const shakeAmt =
        state.shakeEnabled && state.cameraShake > 0 ? state.cameraShake * shakeScale : 0;
      const phase = performance.now() * 0.001;
      const offsetX =
        shakeAmt > 0 ? Math.sin(phase * 14.1) * shakeAmt * 0.48 : 0;
      const offsetY =
        shakeAmt > 0 ? Math.cos(phase * 11.9) * shakeAmt * 0.48 : 0;
      ctx.save();
      ctx.translate(offsetX, offsetY);
      drawArenaRing();
      drawGiftScreenFlashOverlay();

      const { leader, radii } = getBallRadii();
      if (state.uiLastLeader !== null && state.uiLastLeader !== leader) {
        TEAM_IDS.forEach((tid) => teamEls[tid].wrap.classList.remove("is-leader-handoff"));
        if (leader !== "none" && teamEls[leader]) {
          teamEls[leader].wrap.classList.add("is-leader-handoff");
          const lid = leader;
          setTimeout(() => {
            teamEls[lid]?.wrap.classList.remove("is-leader-handoff");
          }, 520);
        }
      }
      state.uiLastLeader = leader;

      drawShockwaves();
      drawDustEffects();
      drawGiftEffects();
      drawCollisionEffects();

      const order = activeTeams()
        .map((id) => ({ id, r: radii[id] }))
        .filter((o) => o.r > 0)
        .sort((a, b) => a.r - b.r);
      order.forEach(({ id }) => {
        const b = state.balls[id];
        drawTeamBadge(id, b.x, b.y, radii[id], leader === id);
      });
      ctx.restore();

      if (state.renderLastLeader !== leader) {
        TEAM_IDS.forEach((id) => {
          teamEls[id].wrap.classList.toggle("leading", leader === id);
        });
        state.renderLastLeader = leader;
      }
    }

    function spawnCollisionEffect(x, y, intensity) {
      const particleCount = Math.min(22, 10 + Math.floor(intensity * 18));
      for (let i = 0; i < particleCount; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 120 + Math.random() * 260 + intensity * 140;
        state.collisionEffects.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0.26 + Math.random() * 0.22,
          maxLife: 0.26 + Math.random() * 0.22,
          size: 2 + Math.random() * 4
        });
      }
      state.collisionEffects.push({
        x,
        y,
        vx: 0,
        vy: 0,
        life: 0.12,
        maxLife: 0.12,
        size: 20 + intensity * 28,
        flash: true
      });
    }

    function spawnDustTrail(x, y, speed) {
      const count = speed > 260 ? 2 : 1;
      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const drift = 14 + Math.random() * 28;
        state.dustEffects.push({
          x: x + (Math.random() - 0.5) * 10,
          y: y + (Math.random() - 0.5) * 10,
          vx: Math.cos(angle) * drift,
          vy: Math.sin(angle) * drift,
          life: 0.24 + Math.random() * 0.24,
          maxLife: 0.24 + Math.random() * 0.24,
          size: 4 + Math.random() * 8
        });
      }
      if (state.dustEffects.length > 160) {
        state.dustEffects.splice(0, state.dustEffects.length - 160);
      }
    }

    function spawnShockwave(x, y, intensity) {
      state.shockwaves.push({
        x,
        y,
        radius: 8,
        growth: 220 + intensity * 220,
        life: 0.18,
        maxLife: 0.18,
        width: 2 + intensity * 2
      });
      if (state.shockwaves.length > 12) {
        state.shockwaves.splice(0, state.shockwaves.length - 12);
      }
    }

    function getTeamBall(teamId) {
      return state.balls[teamId];
    }

    const giftStyles = {
      fb: { color: "#f4c400", icon: "star" },
      amed: { color: "#1e8f3e", icon: "heart" },
      bjk: { color: "#ffffff", icon: "coin" },
      gs: { color: "#fcb514", icon: "star" },
      ts: { color: "#7ec8ff", icon: "rose" },
      p6: { color: "#c8a8ff", icon: "star" },
      p7: { color: "#ff9ec8", icon: "heart" },
      p8: { color: "#88f0d0", icon: "coin" },
      p9: { color: "#ffb454", icon: "star" },
      p10: { color: "#9ec0ff", icon: "rose" }
    };

    function spawnGiftScreenFlash(points) {
      const E = ARENA5GEN.effects;
      if (points < E.screenFlashPointThreshold) return;
      state.giftScreenFlash = {
        life: E.screenFlashLife,
        strength: Math.min(1, points / 36)
      };
    }

    function tickGiftScreenFlash(dtSec) {
      const f = state.giftScreenFlash;
      if (!f || f.life <= 0) return;
      f.life -= dtSec;
      if (f.life <= 0) state.giftScreenFlash = null;
    }

    function drawGiftScreenFlashOverlay() {
      const f = state.giftScreenFlash;
      if (!f || f.life <= 0) return;
      const a = Math.min(0.42, f.strength * 0.55 * (f.life / ARENA5GEN.effects.screenFlashLife));
      ctx.save();
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.fillStyle = `rgba(255, 248, 220, ${a})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.restore();
    }

    function drawLeaderCrown(cx, cy, r) {
      const cr = r * 0.42;
      const y0 = cy - r - cr * 0.35;
      ctx.save();
      ctx.strokeStyle = "rgba(255, 220, 120, 0.95)";
      ctx.fillStyle = "rgba(255, 210, 60, 0.88)";
      ctx.lineWidth = 2;
      ctx.lineJoin = "round";
      ctx.beginPath();
      ctx.moveTo(cx - cr * 1.1, y0 + cr * 0.55);
      ctx.lineTo(cx - cr * 0.55, y0 - cr * 0.15);
      ctx.lineTo(cx - cr * 0.2, y0 + cr * 0.25);
      ctx.lineTo(cx, y0 - cr * 0.55);
      ctx.lineTo(cx + cr * 0.2, y0 + cr * 0.25);
      ctx.lineTo(cx + cr * 0.55, y0 - cr * 0.15);
      ctx.lineTo(cx + cr * 1.1, y0 + cr * 0.55);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function spawnGiftBurst(teamId, points) {
      const E = ARENA5GEN.effects;
      const pts = Math.max(1, Math.floor(points || 1));
      const intensity = Math.min(1, pts / 40);
      const n = Math.min(
        E.giftParticlesCap,
        Math.floor(E.giftParticlesBase + pts * E.giftParticlesPerPoint)
      );
      const source = getTeamBall(teamId);
      const style = giftStyles[teamId] || giftStyles.fb;
      for (let i = 0; i < n; i++) {
        const ang = Math.random() * Math.PI * 2;
        const sp = 90 + Math.random() * 160 + intensity * 200;
        state.giftEffects.push({
          x: source.x + (Math.random() - 0.5) * (36 + pts * 0.6),
          y: source.y + (Math.random() - 0.5) * (28 + pts * 0.45),
          vx: Math.cos(ang) * sp * 0.55 + (Math.random() - 0.5) * 70,
          vy: -(110 + Math.random() * 140 + intensity * 160),
          life: 0.72 + Math.random() * 0.55 + intensity * 0.35,
          maxLife: 0.72 + Math.random() * 0.55 + intensity * 0.35,
          size: 11 + Math.random() * 9 + intensity * 10,
          icon: style.icon,
          color: style.color
        });
      }
      if (state.giftEffects.length > E.giftEffectCap) {
        state.giftEffects.splice(0, state.giftEffects.length - E.giftEffectCap);
      }
      if (pts >= E.shockwavePointThreshold) {
        spawnShockwave(source.x, source.y, Math.min(1, intensity * 1.1));
      }
      if (state.shakeEnabled && pts >= 10) {
        state.cameraShake = Math.min(1, state.cameraShake + 0.08 + intensity * 0.35);
      }
      spawnGiftScreenFlash(pts);
    }

    function updateCollisionEffects(dtSec) {
      for (let i = state.collisionEffects.length - 1; i >= 0; i--) {
        const p = state.collisionEffects[i];
        p.life -= dtSec;
        if (p.life <= 0) {
          state.collisionEffects.splice(i, 1);
          continue;
        }
        if (!p.flash) {
          p.x += p.vx * dtSec;
          p.y += p.vy * dtSec;
          p.vx *= 0.94;
          p.vy *= 0.94;
        }
      }
    }

    function updateDustEffects(dtSec) {
      for (let i = state.dustEffects.length - 1; i >= 0; i--) {
        const p = state.dustEffects[i];
        p.life -= dtSec;
        if (p.life <= 0) {
          state.dustEffects.splice(i, 1);
          continue;
        }
        p.x += p.vx * dtSec;
        p.y += p.vy * dtSec;
        p.vx *= 0.9;
        p.vy *= 0.9;
      }
    }

    function updateShockwaves(dtSec) {
      for (let i = state.shockwaves.length - 1; i >= 0; i--) {
        const s = state.shockwaves[i];
        s.life -= dtSec;
        if (s.life <= 0) {
          state.shockwaves.splice(i, 1);
          continue;
        }
        s.radius += s.growth * dtSec;
      }
    }

    function updateGiftEffects(dtSec) {
      for (let i = state.giftEffects.length - 1; i >= 0; i--) {
        const g = state.giftEffects[i];
        g.life -= dtSec;
        if (g.life <= 0) {
          state.giftEffects.splice(i, 1);
          continue;
        }
        g.x += g.vx * dtSec;
        g.y += g.vy * dtSec;
        g.vx *= 0.96;
        g.vy += 80 * dtSec;
      }
    }

    function drawCollisionEffects() {
      state.collisionEffects.forEach((p) => {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.save();
        if (p.flash) {
          const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.size);
          g.addColorStop(0, `rgba(255, 245, 200, ${alpha * 0.9})`);
          g.addColorStop(1, "rgba(255, 210, 120, 0)");
          ctx.fillStyle = g;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fill();
        } else {
          ctx.fillStyle = `rgba(255, 210, 130, ${alpha * 0.9})`;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
    }

    function drawDustEffects() {
      state.dustEffects.forEach((p) => {
        const alpha = Math.max(0, p.life / p.maxLife);
        ctx.fillStyle = `rgba(80, 80, 80, ${alpha * 0.3})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    function drawShockwaves() {
      state.shockwaves.forEach((s) => {
        const alpha = Math.max(0, s.life / s.maxLife);
        ctx.strokeStyle = `rgba(255, 214, 150, ${alpha * 0.55})`;
        ctx.lineWidth = s.width;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
        ctx.stroke();
      });
    }

    function drawGiftIcon(gift) {
      const alpha = Math.max(0, gift.life / gift.maxLife);
      const age = 1 - alpha;
      const pop = 0.78 + 0.28 * (1 - age * age);
      const s = gift.size * pop;
      ctx.save();
      ctx.translate(gift.x, gift.y);
      ctx.globalAlpha = alpha;

      if (gift.icon === "coin") {
        ctx.fillStyle = gift.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, s * 0.85, s * 0.65, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.75)";
        ctx.lineWidth = 1.8;
        ctx.stroke();
      } else if (gift.icon === "heart") {
        ctx.fillStyle = gift.color;
        ctx.beginPath();
        ctx.moveTo(0, s * 0.5);
        ctx.bezierCurveTo(-s * 1.1, -s * 0.2, -s * 0.65, -s * 1.15, 0, -s * 0.55);
        ctx.bezierCurveTo(s * 0.65, -s * 1.15, s * 1.1, -s * 0.2, 0, s * 0.5);
        ctx.fill();
      } else if (gift.icon === "star") {
        drawStar(0, 0, s * 0.72, gift.color);
      } else {
        ctx.strokeStyle = gift.color;
        ctx.lineWidth = 2.1;
        ctx.beginPath();
        ctx.arc(0, 0, s * 0.4, Math.PI * 0.2, Math.PI * 1.8);
        ctx.stroke();
        ctx.fillStyle = gift.color;
        ctx.beginPath();
        ctx.arc(0, -s * 0.45, s * 0.18, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();
    }

    function drawGiftEffects() {
      state.giftEffects.forEach(drawGiftIcon);
    }

    function reflectOnArenaWall(ball, r, arena, wallPasses = 9) {
      const { cx, cy, radius } = arena;
      const verts = getArenaVertices(cx, cy, radius);
      resolveArenaWall(ball, r, verts, cx, cy, wallPasses);
    }

    function resolveBallCollision(ballA, rA, ballB, rB, playEffects = true) {
      const dx = ballB.x - ballA.x;
      const dy = ballB.y - ballA.y;
      const dist = Math.hypot(dx, dy) || 0.0001;
      const minDist = rA + rB;
      if (dist >= minDist) return;

      const nx = dx / dist;
      const ny = dy / dist;
      const overlap = minDist - dist;

      ballA.x -= nx * (overlap / 2);
      ballA.y -= ny * (overlap / 2);
      ballB.x += nx * (overlap / 2);
      ballB.y += ny * (overlap / 2);

      const relVel = (ballB.vx - ballA.vx) * nx + (ballB.vy - ballA.vy) * ny;
      if (relVel <= 0) {
        if (playEffects) {
          const impact = Math.min(1, Math.abs(relVel) / 600);
          const contactX = ballA.x + nx * rA;
          const contactY = ballA.y + ny * rA;
          spawnCollisionEffect(contactX, contactY, impact);
          spawnShockwave(contactX, contactY, impact);
          if (state.shakeEnabled) {
            const nta = activeTeams().length;
            const add = nta >= 3 ? 0.08 + impact * 0.12 : 0.28 + impact * 0.32;
            const cap = nta >= 3 ? ARENA5GEN.effects.collisionShakeCap3 : 1;
            state.cameraShake = Math.min(cap, state.cameraShake + add);
          }
        }

        const e = ARENA5GEN.physics.collisionRestitution;
        const mA = Math.max(1, rA ** ARENA5GEN.physics.massExponent);
        const mB = Math.max(1, rB ** ARENA5GEN.physics.massExponent);
        const invSum = 1 / mA + 1 / mB;
        const j = -(1 + e) * relVel / invSum;
        ballA.vx -= (j / mA) * nx;
        ballA.vy -= (j / mA) * ny;
        ballB.vx += (j / mB) * nx;
        ballB.vy += (j / mB) * ny;

        const tx = -ny;
        const ty = nx;
        const relT = (ballB.vx - ballA.vx) * tx + (ballB.vy - ballA.vy) * ty;
        const tDamp = ARENA5GEN.physics.tangentDampPair;
        const jt = relT * tDamp * 0.5;
        ballA.vx += tx * jt;
        ballA.vy += ty * jt;
        ballB.vx -= tx * jt;
        ballB.vy -= ty * jt;
      }
    }

    function stepPhysics(dtSec) {
      const arena = getArenaGeometry();
      const { radii } = getBallRadii();
      const scaledDt = dtSec * state.speedMultiplier;
      const balls = activeTeams().map((id) => ({ ball: state.balls[id], radius: radii[id] }));
      const maxRAll = Math.max(...balls.map((b) => b.radius), 36);
      const nt = balls.length;
      const P = ARENA5GEN.physics;
      const heavyPack = nt >= 3 && maxRAll >= P.heavyPackRadius;
      const wallPasses = heavyPack ? P.wallPassesHeavy : P.wallPassesNormal;
      const colPasses = heavyPack ? P.colPassesHeavy : P.colPassesNormal;

      balls.forEach(({ ball }) => {
        ball.x += ball.vx * scaledDt;
        ball.y += ball.vy * scaledDt;
        spawnDustTrail(ball.x, ball.y, Math.hypot(ball.vx, ball.vy));
      });

      balls.forEach(({ ball, radius }) => {
        reflectOnArenaWall(ball, badgeWallRadius(radius), arena, wallPasses);
      });

      for (let pass = 0; pass < colPasses; pass++) {
        for (let i = 0; i < balls.length; i++) {
          for (let j = i + 1; j < balls.length; j++) {
            resolveBallCollision(
              balls[i].ball,
              badgeWallRadius(balls[i].radius),
              balls[j].ball,
              badgeWallRadius(balls[j].radius),
              pass === 0
            );
          }
        }
      }

      balls.forEach(({ ball, radius }) => {
        reflectOnArenaWall(ball, badgeWallRadius(radius), arena, wallPasses);
      });
      updateCollisionEffects(scaledDt);
      updateDustEffects(scaledDt);
      updateShockwaves(scaledDt);
      updateGiftEffects(scaledDt);
      state.cameraShake = Math.max(
        0,
        state.cameraShake - scaledDt * (activeTeams().length >= 3 ? 3.6 : 2.2)
      );

      let minSpeed = Math.max(
        P.minSpeedBase,
        Math.min(210, 312 - maxRAll * P.minSpeedRadiusFactor)
      );
      if (nt >= 3) minSpeed *= P.minSpeedThreeScale;
      const maxSpeedGlobal = Math.max(minSpeed + 45, Math.min(P.maxSpeedBase, 1580 / (1 + maxRAll * 0.011)));

      activeTeams().forEach((id) => {
        const ball = state.balls[id];
        const rad = radii[id] || 36;
        const mass = Math.max(1, rad ** P.massExponent);
        const maxSp = maxSpeedGlobal / (1 + mass / P.maxSpeedMassDivisor);
        let speed = Math.hypot(ball.vx, ball.vy);
        if (speed < minSpeed) {
          const factor = minSpeed / (speed || 1);
          ball.vx *= factor;
          ball.vy *= factor;
          speed = minSpeed;
        }
        if (speed > maxSp) {
          const f = maxSp / speed;
          ball.vx *= f;
          ball.vy *= f;
        }
      });
    }

    function tickDisplayScores(dtSec) {
      const k = Math.min(1, dtSec * ARENA5GEN.scoreUi.lerpPerSec);
      const act = new Set(activeTeams());
      TEAM_IDS.forEach((id) => {
        if (!act.has(id)) {
          state.displayScores[id] = state.scores[id];
          teamEls[id].score.textContent = String(state.scores[id]);
          return;
        }
        const tgt = state.scores[id];
        let d = state.displayScores[id];
        d += (tgt - d) * k;
        if (Math.abs(tgt - d) < 0.48) d = tgt;
        state.displayScores[id] = d;
        teamEls[id].score.textContent = String(Math.round(d));
      });
    }

    function animate(ts) {
      if (document.hidden) {
        state.lastFrameTime = 0;
        requestAnimationFrame(animate);
        return;
      }
      if (!state.lastFrameTime) state.lastFrameTime = ts;
      const dtSec = Math.min((ts - state.lastFrameTime) / 1000, 0.04);
      state.lastFrameTime = ts;
      tickRoundHud();
      tickSmoothBallRadii(dtSec);
      tickGiftScreenFlash(dtSec);
      stepPhysics(dtSec);
      tickDisplayScores(dtSec);
      render();
      requestAnimationFrame(animate);
    }

    function stopLeadSong() {
      if (state.leaderMusicPlayingId) saveMusicPlaybackPosition(state.leaderMusicPlayingId);
      teardownLeaderEndedListener();
      TEAM_IDS.forEach((id) => {
        state.audios[id].pause();
      });
      state.leaderMusicPlayingId = null;
    }

    async function playLeaderSong(leader, opts = {}) {
      if (!state.audioReady) return;
      const forceRestart = opts.forceRestart === true;
      const prevPlaying = state.leaderMusicPlayingId;

      if (leader === "none") {
        if (prevPlaying) saveMusicPlaybackPosition(prevPlaying);
        TEAM_IDS.forEach((id) => state.audios[id].pause());
        teardownLeaderEndedListener();
        state.leaderMusicPlayingId = null;
        return;
      }

      const a = state.audios[leader];
      if (!a || !a.src) {
        if (prevPlaying) saveMusicPlaybackPosition(prevPlaying);
        TEAM_IDS.forEach((id) => state.audios[id].pause());
        teardownLeaderEndedListener();
        state.leaderMusicPlayingId = null;
        return;
      }

      if (!forceRestart && prevPlaying === leader && !a.paused && !a.ended) {
        wireLeaderMusicEndedHandler(leader, a);
        return;
      }

      if (prevPlaying && prevPlaying !== leader) {
        saveMusicPlaybackPosition(prevPlaying);
      }

      TEAM_IDS.forEach((id) => {
        if (id !== leader) state.audios[id].pause();
      });

      teardownLeaderEndedListener();

      if (forceRestart) {
        try {
          a.currentTime = 0;
        } catch (_e) {}
        if (!state.musicPlaybackTime) state.musicPlaybackTime = Object.create(null);
        state.musicPlaybackTime[leader] = { t: 0, key: audioTrackKey(a) };
      } else {
        restoreMusicPlaybackPosition(leader);
      }

      wireLeaderMusicEndedHandler(leader, a);

      try {
        await a.play();
        state.leaderMusicPlayingId = leader;
      } catch (_e) {}
    }

    async function initAudio() {
      if (state.audioReady) return;
      state.audioReady = true;
      await playLeaderSong(getLeader());
    }

    function refreshScoreboardOrder() {
      const ids = activeTeams();
      const ranked = ids
        .map((id) => ({
          id,
          score: state.scores[id],
          el: teamEls[id].wrap
        }))
        .sort((a, b) => {
          if (b.score !== a.score) return b.score - a.score;
          return TEAM_IDS.indexOf(a.id) - TEAM_IDS.indexOf(b.id);
        });
      ranked.forEach((row, index) => {
        row.el.style.order = String(index);
      });
      TEAM_IDS.forEach((id) => {
        if (!ids.includes(id)) teamEls[id].wrap.style.order = "99";
      });
    }

    function updateAll() {
      refreshScoreboardOrder();
      const leader = getLeader();
      if (leader !== state.currentLeader) {
        state.currentLeader = leader;
        playLeaderSong(leader);
      }
      render();
    }

    if (typeof GemtokGameSettingsFab !== "undefined") {
      GemtokGameSettingsFab.wire(openSettings, { backdropId: "settings-backdrop" });
    } else {
      document.getElementById("gemtok-open-settings")?.addEventListener("click", (e) => {
        e.stopPropagation();
        openSettings();
      });
    }

    if (roundEndOverlay) {
      roundEndOverlay.addEventListener("click", (ev) => ev.stopPropagation());
    }

    settingsBackdrop.addEventListener("click", (e) => {
      if (e.target === settingsBackdrop || e.target.classList.contains("settings-overlay__backdrop")) closeSettings();
    });
    settingsClose.addEventListener("click", closeSettings);

    if (settingsRoundMin) {
      settingsRoundMin.addEventListener("change", () => {
        const fixed = persistRoundMinutes(parseInt(settingsRoundMin.value, 10));
        settingsRoundMin.value = String(fixed);
      });
    }

    if (settingsPlayerMinus) {
      settingsPlayerMinus.addEventListener("click", (ev) => {
        ev.stopPropagation();
        setActiveTeamCount(getActiveTeamCount() - 1);
      });
    }
    if (settingsPlayerPlus) {
      settingsPlayerPlus.addEventListener("click", (ev) => {
        ev.stopPropagation();
        setActiveTeamCount(getActiveTeamCount() + 1);
      });
    }
    if (settingsShake) {
      settingsShake.addEventListener("change", () => {
        persistShake(settingsShake.checked);
      });
    }
    if (settingsArenaTheme) {
      settingsArenaTheme.addEventListener("change", () => {
        persistTheme(settingsArenaTheme.value);
        render();
      });
    }

    if (settingsSpeedRange) {
      settingsSpeedRange.addEventListener("input", () => {
        const raw = parseInt(settingsSpeedRange.value, 10);
        if (!Number.isFinite(raw)) return;
        state.speedMultiplier = clampSpeedMultiplier(raw / 100);
        persistSpeedToStorage();
      });
    }

    const tikfinityWsSave = document.getElementById("tikfinity-ws-save");
    if (tikfinityWsSave) {
      tikfinityWsSave.addEventListener("click", (ev) => {
        ev.stopPropagation();
        const inp = document.getElementById("tikfinity-ws-input");
        const v = (inp && inp.value.trim()) || "";
        if (v && /^wss?:\/\//i.test(v)) {
          try {
            localStorage.setItem(WS_STORAGE_KEY, v);
          } catch (_e) {}
        } else if (inp) {
          try {
            localStorage.removeItem(WS_STORAGE_KEY);
          } catch (_e) {}
        }
        connectTikfinity({ bypassDisable: true });
      });
    }

    settingsBackdrop?.addEventListener("click", (ev) => {
      const browseMusic = ev.target.closest("[data-music-browse]");
      if (browseMusic) {
        ev.stopPropagation();
        const id = browseMusic.getAttribute("data-music-browse");
        const slot = browseMusic.getAttribute("data-music-slot") || "0";
        document.getElementById(`file-music-${id}-${slot}`)?.click();
        return;
      }
      const clearMusicSlot = ev.target.closest("[data-music-clear-slot]");
      if (clearMusicSlot) {
        ev.stopPropagation();
        const id = clearMusicSlot.getAttribute("data-music-clear-slot");
        const slot = clearMusicSlot.getAttribute("data-music-slot") || "0";
        void applyTeamMusicSlot(id, slot, null);
        return;
      }
      const clearMusicAll = ev.target.closest("[data-music-clear-all]");
      if (clearMusicAll) {
        ev.stopPropagation();
        void applyTeamMusicClearAll(clearMusicAll.getAttribute("data-music-clear-all"));
        return;
      }
      const clearBtn = ev.target instanceof Element ? ev.target.closest("[data-clear]") : null;
      if (!clearBtn) return;
      ev.stopPropagation();
      applyTeamPhoto(clearBtn.getAttribute("data-clear"), "");
    });

    settingsBackdrop?.addEventListener("change", (ev) => {
      const t = ev.target;
      if (!(t instanceof HTMLInputElement)) return;
      const mfm = /^file-music-(.+)-(\d)$/.exec(t.id);
      if (mfm) {
        const id = mfm[1];
        const slot = mfm[2];
        const f = t.files && t.files[0];
        t.value = "";
        if (!f) return;
        if (!f.type.startsWith("audio/") && !/\.(mp3|m4a|aac|ogg|wav|webm|flac)$/i.test(f.name)) return;
        void applyTeamMusicSlot(id, slot, f);
        return;
      }
      const mt = /^teamPhotoUrl-(.+)$/.exec(t.id);
      if (mt && t.type === "text") {
        applyTeamPhoto(mt[1], t.value.trim());
        return;
      }
      const mf = /^file-(.+)$/.exec(t.id);
      if (!mf || t.type !== "file") return;
      const id = mf[1];
      const f = t.files && t.files[0];
      t.value = "";
      if (!f || !f.type.startsWith("image/")) return;
      fileToResizedDataUrl(f, 320, (dataUrl) => {
        if (dataUrl) applyTeamPhoto(id, dataUrl);
      });
    });

    settingsBackdrop?.addEventListener("input", (ev) => {
      const t = ev.target;
      if (!(t instanceof HTMLInputElement)) return;
      const mt = /^teamPhotoUrl-(.+)$/.exec(t.id);
      if (!mt) return;
      const preview = document.getElementById(`teamPhotoPreview-${mt[1]}`);
      if (preview) preview.src = t.value.trim() || "data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=";
    });

    function handleKeyScore(event) {
      if (event.key === "Escape" && settingsBackdrop && !settingsBackdrop.hidden) {
        event.preventDefault();
        closeSettings();
        return;
      }
      const keys = activeTeams();
      let teamId = null;
      if (event.key === "0") teamId = keys[9] || null;
      else {
        const ix = "123456789".indexOf(event.key);
        if (ix >= 0) teamId = keys[ix] || null;
      }
      if (teamId) {
        if (state.roundFrozen) return;
        if (!state.audioReady) initAudio();
        state.scores[teamId] += 1;
        spawnGiftBurst(teamId, 1);
        updateAll();
        return;
      }
      if (event.key === "ArrowUp") {
        state.speedMultiplier = clampSpeedMultiplier(state.speedMultiplier + 0.15);
        persistSpeedToStorage();
      } else if (event.key === "ArrowDown") {
        state.speedMultiplier = clampSpeedMultiplier(state.speedMultiplier - 0.15);
        persistSpeedToStorage();
      }
    }

    window.addEventListener("keydown", handleKeyScore);
    window.addEventListener("beforeunload", () => {
      stopLeadSong();
      clearRoundRestartTimer();
      detachGiftHubCatalogListener();
      disconnectTikfinity({ intentional: true });
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState !== "visible") return;
      if (isTikfinityAutoWsDisabled()) return;
      const w = state.tikfinity.ws;
      if (!w || w.readyState === WebSocket.CLOSED) connectTikfinity({ bypassDisable: true });
    });
    window.addEventListener("pageshow", (ev) => {
      if (!ev.persisted) return;
      if (isTikfinityAutoWsDisabled()) return;
      connectTikfinity({ bypassDisable: true });
    });

    loadPhotosFromStorage();
    renderTeamPhotoSettingsRows();
    renderTeamMusicSettingsRows();
    void loadTeamMusicFromIDB();
    TEAM_IDS.forEach((id) => {
      if (state.teamPhotos[id]) applyTeamPhoto(id, state.teamPhotos[id]);
    });
    if (settingsRoundMin) settingsRoundMin.value = String(getRoundMinutes());
    if (settingsPlayerVal) settingsPlayerVal.textContent = String(getActiveTeamCount());
    if (settingsShake) settingsShake.checked = state.shakeEnabled;
    if (settingsArenaTheme) {
      settingsArenaTheme.value = ARENA_THEME_COLORS[state.arenaTheme] ? state.arenaTheme : "default";
    }
    syncSpeedSettingsUi();

    initGiftAssignPanelListeners();
    attachGiftHubCatalogListener();
    void refreshGiftHubMappings();

    beginNewRound();
    if (!isTikfinityAutoWsDisabled()) connectTikfinity();
    requestAnimationFrame(animate);
  </script>
